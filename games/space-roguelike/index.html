<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>虛空領航員 — Void Navigator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',monospace}
canvas{display:block;cursor:crosshair}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;user-select:none}
#shopModal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(5,8,20,0.97);border:1px solid #2a4a6a;border-radius:12px;
  padding:24px;width:min(600px,95vw);max-height:85vh;overflow-y:auto;z-index:100;color:#c8dff0;pointer-events:all}
#shopModal h2{color:#4af;font-size:20px;margin-bottom:6px;letter-spacing:2px}
#shopModal .sub{color:#567;font-size:13px;margin-bottom:16px}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shop-item{background:rgba(20,40,70,0.8);border:1px solid #1a3a5a;border-radius:8px;
  padding:12px;cursor:pointer;transition:border-color .2s,background .2s}
.shop-item:hover{border-color:#4af;background:rgba(30,60,100,0.9)}
.shop-item.bought{opacity:0.45;cursor:not-allowed;border-color:#333}
.shop-item.cant-afford{opacity:0.5;cursor:not-allowed}
.shop-item h3{font-size:13px;color:#8cf;margin-bottom:4px}
.shop-item p{font-size:11px;color:#789;line-height:1.4}
.shop-item .cost{font-size:11px;color:#fa8;margin-top:6px;font-weight:bold}
#shopClose{margin-top:16px;width:100%;padding:10px;background:#1a3a6a;border:1px solid #4af;
  color:#4af;border-radius:6px;cursor:pointer;font-size:14px;letter-spacing:1px}
#shopClose:hover{background:#2a5a9a}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay"></div>
<div id="shopModal">
  <h2>⚡ 太空站補給</h2>
  <div class="sub">使用礦石與晶體升級你的太空艇</div>
  <div class="shop-grid" id="shopGrid"></div>
  <button id="shopClose" onclick="closeShop()">離開太空站 [E]</button>
</div>

<script>
'use strict';
// ═══════════════════════════════════
//  虛空領航員 — Void Navigator
// ═══════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── Constants ──
const CHUNK = 1800;
const LOAD_R = 2;
const WARP_POSITIONS = [
  {x:7500,y:2500},{x:-6500,y:5500},{x:3500,y:-8500},{x:-5500,y:-4500},{x:9000,y:-5500}
];
const PORTAL_POS = {x:12000,y:0};

// ── Seeded RNG ──
function makeRng(cx,cy){
  let s = Math.imul(cx^0xdeadbeef, 2654435761) ^ Math.imul(cy^0xcafebabe, 2246822519);
  s = s >>> 0;
  return ()=>{
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    return (s>>>0)/0xFFFFFFFF;
  };
}

// ── Input ──
const keys={};
const mouse={x:W/2,y:H/2,down:false};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Escape') togglePause();
  if(e.code==='KeyE') toggleShop();
  if(e.code==='Enter'||e.code==='NumpadEnter'){
    if(gs.state==='title') startGame();
    else if(gs.state==='dead'||gs.state==='win') startGame();
  }
  e.preventDefault();
},{passive:false});
window.addEventListener('keyup',e=>{ keys[e.code]=false; });
canvas.addEventListener('mousemove',e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
canvas.addEventListener('mousedown',e=>{ mouse.down=true; if(gs.state==='title') startGame(); });
canvas.addEventListener('mouseup',e=>{ mouse.down=false; });
canvas.addEventListener('contextmenu',e=>e.preventDefault());


// ── Stars (parallax) ──
const starLayers = [
  Array.from({length:200},()=>({x:Math.random()*4000,y:Math.random()*4000,r:0.6+Math.random()*0.8,s:0.05})),
  Array.from({length:100},()=>({x:Math.random()*4000,y:Math.random()*4000,r:0.9+Math.random()*1.2,s:0.15})),
  Array.from({length:40}, ()=>({x:Math.random()*4000,y:Math.random()*4000,r:1.2+Math.random()*1.8,s:0.3})),
];

// ── Game State ──
const gs = {
  state:'title', // title|playing|paused|dead|win
  time:0,
  playTime:0,
  score:0,
  shopOpen:false,
  nearStation:null,
  statusMsg:'',
  statusTimer:0,
  gravity:0,
  gravTimer:0,
};

// ── Player ──
function makePlayer(){
  return {
    x:600,y:0, vx:0,vy:0,
    angle:0,
    hull:100,maxHull:100,
    shield:60,maxShield:60,
    shieldTimer:0,
    invTimer:0,
    fireCooldown:0,
    ore:0,crystal:0,tech:0,warpCores:0,
    collectedCores:new Set(),
    engineLv:1,shieldLv:1,hullLv:1,weaponLv:1,
    deepScanner:false,lootFinder:false,combatExpert:false,
    evasion:false,autoRepair:false,autoRepairTimer:0,
    radius:14,
  };
}
let player = makePlayer();

// ── Entities ──
let chunks=new Map(), asteroids=[], enemies=[], items=[], bullets=[], eparticles=[], particles=[];

// ── Warp core items in world ──
let warpCoreItems = WARP_POSITIONS.map((p,i)=>({
  x:p.x,y:p.y,type:'warpCore',radius:18,id:i,collected:false,bobT:Math.random()*Math.PI*2
}));
let escapePortal = null;

// ── Chunk generation ──
function getChunk(cx,cy){
  const k=`${cx},${cy}`;
  if(chunks.has(k)) return chunks.get(k);
  const rng=makeRng(cx,cy);
  const wx=cx*CHUNK, wy=cy*CHUNK;
  const dist=Math.sqrt(cx*cx+cy*cy);
  const ch={cx,cy,asteroids:[],enemies:[],items:[],station:null};

  // Asteroids
  const na=6+Math.floor(rng()*8);
  for(let i=0;i<na;i++){
    const r=20+rng()*28;
    const pts=[];
    const ns=7+Math.floor(rng()*5);
    for(let j=0;j<ns;j++){
      const a=(j/ns)*Math.PI*2;
      pts.push({a,r:r*(0.7+rng()*0.6)});
    }
    ch.asteroids.push({x:wx+rng()*CHUNK,y:wy+rng()*CHUNK,radius:r,pts,
      hp:3+Math.floor(dist),ore:2+Math.floor(rng()*3),angle:rng()*Math.PI*2});
  }

  // Enemies
  if(dist>0.5){
    const ne=Math.floor(Math.min(dist*0.8+rng()*2,5));
    for(let i=0;i<ne;i++){
      const ex=wx+100+rng()*(CHUNK-200), ey=wy+100+rng()*(CHUNK-200);
      const tier=Math.floor(dist);
      const types=['drone','drone','pirate','pirate','alien'];
      const type=types[Math.min(Math.floor(rng()*(tier+2)),4)];
      ch.enemies.push(makeEnemy(ex,ey,type,tier,rng));
    }
  }

  // Items
  const ni=1+Math.floor(rng()*4);
  for(let i=0;i<ni;i++){
    ch.items.push(makeItem(wx+rng()*CHUNK,wy+rng()*CHUNK,dist,rng));
  }

  // Station (1/8 chance, not in center chunk)
  if(dist>1 && rng()<0.125){
    ch.station={x:wx+400+rng()*(CHUNK-800),y:wy+400+rng()*(CHUNK-800),radius:36,visited:false};
  }

  chunks.set(k,ch);
  return ch;
}

function makeEnemy(x,y,type,tier,rng){
  const base={drone:{hp:30,speed:95,dmg:10,rate:0,color:'#55aacc',radius:13},
    pirate:{hp:55,speed:130,dmg:12,rate:1.8,color:'#ff8822',radius:15},
    alien:{hp:80,speed:155,dmg:20,rate:1.2,color:'#cc44ff',radius:17}};
  const b=base[type];
  const scale=1+tier*0.15;
  return {x,y,vx:0,vy:0,type,hp:b.hp*scale,maxHp:b.hp*scale,
    speed:b.speed,dmg:b.dmg*scale,rate:b.rate,color:b.color,radius:b.radius,
    fireCd:rng()*(b.rate||1),angle:0,
    state:'patrol',
    px:x+(rng()-0.5)*500,py:y+(rng()-0.5)*500,
    active:false,dead:false};
}

function makeItem(x,y,dist,rng){
  const roll=rng();
  let type;
  if(roll<0.25) type='energyCell';
  else if(roll<0.50) type='hullPlate';
  else if(roll<0.70) type='ore';
  else if(roll<0.87) type='crystal';
  else type='tech';
  const colors={energyCell:'#00ffcc',hullPlate:'#4488ff',ore:'#cc8844',crystal:'#cc44ff',tech:'#ffff44'};
  return {x,y,type,color:colors[type],radius:11,bobT:rng()*Math.PI*2,collected:false};
}


// ── Load/Unload chunks around player ──
function updateChunks(){
  const pcx=Math.floor(player.x/CHUNK), pcy=Math.floor(player.y/CHUNK);
  asteroids=[]; enemies=[]; items=[];
  const stations=[];
  for(let dx=-LOAD_R;dx<=LOAD_R;dx++){
    for(let dy=-LOAD_R;dy<=LOAD_R;dy++){
      const ch=getChunk(pcx+dx,pcy+dy);
      ch.asteroids.forEach(a=>{if(!a.dead) asteroids.push(a)});
      ch.enemies.forEach(e=>{if(!e.dead) enemies.push(e)});
      ch.items.forEach(it=>{if(!it.collected) items.push(it)});
      if(ch.station) stations.push(ch.station);
    }
  }
  // warp cores
  warpCoreItems.forEach(wc=>{if(!wc.collected) items.push(wc)});
  // escape portal
  if(escapePortal) stations.push(escapePortal);
  return stations;
}

// ── Physics helpers ──
function dist2(a,b){ return (a.x-b.x)**2+(a.y-b.y)**2; }
function dist(a,b){ return Math.sqrt(dist2(a,b)); }
function angle(a,b){ return Math.atan2(b.y-a.y,b.x-a.x); }
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

// ── Collision circles ──
function circlesOverlap(a,b){ return dist2(a,b)<(a.radius+b.radius)**2; }

// ── Player update ──
function updatePlayer(dt, stationsList){
  const p=player;
  if(p.hull<=0) return;

  // Thrust
  const spd = 220*(1+(p.engineLv-1)*0.3);
  let ax=0,ay=0;
  if(keys['KeyW']||keys['ArrowUp'])    { ax+=Math.cos(p.angle)*spd; ay+=Math.sin(p.angle)*spd; }
  if(keys['KeyS']||keys['ArrowDown'])  { ax-=Math.cos(p.angle)*spd*0.5; ay-=Math.sin(p.angle)*spd*0.5; }
  if(keys['KeyA']||keys['ArrowLeft'])  { p.angle -= 2.2*dt; }
  if(keys['KeyD']||keys['ArrowRight']) { p.angle += 2.2*dt; }

  // Aim with mouse (auto-rotate toward mouse if not using keyboard turn)
  const mx=(mouse.x-W/2)+p.x, my=(mouse.y-H/2)+p.y;
  const targetAngle=Math.atan2(my-p.y,mx-p.x);
  if(!keys['KeyA']&&!keys['ArrowLeft']&&!keys['KeyD']&&!keys['ArrowRight']){
    let da=targetAngle-p.angle;
    while(da>Math.PI) da-=Math.PI*2; while(da<-Math.PI) da+=Math.PI*2;
    p.angle+=clamp(da*8*dt,-2.5*dt,2.5*dt);
  }

  // Gravity from black hole
  const d=dist(p,{x:0,y:0});
  if(d>0.1){
    const grav=gs.gravity/(Math.pow(d,0.8)+0.001);
    const gravCapped=Math.min(grav,60);
    ax-=(p.x/d)*gravCapped;
    ay-=(p.y/d)*gravCapped;
    // Black hole damage
    if(d<200 && p.invTimer<=0){ damagePlayer(50*dt,'黑洞正在吞噬你！'); }
  }

  p.vx=(p.vx+ax*dt)*0.88;
  p.vy=(p.vy+ay*dt)*0.88;
  p.x+=p.vx*dt;
  p.y+=p.vy*dt;

  // Asteroid collision
  for(const a of asteroids){
    if(dist2(p,a)<(p.radius+a.radius)**2){
      const ang=angle(a,p);
      p.vx+=Math.cos(ang)*3; p.vy+=Math.sin(ang)*3;
      if(p.invTimer<=0) damagePlayer(15,'撞上小行星！');
    }
  }

  // Shooting
  p.fireCooldown-=dt;
  const fireRate=0.22*(p.combatExpert?0.7:1);
  if((mouse.down||keys['Space'])&&p.fireCooldown<=0){
    p.fireCooldown=fireRate;
    const bspd=650;
    const dmgMult=[1,1.35,1.75][p.weaponLv-1];
    bullets.push({x:p.x,y:p.y,
      vx:Math.cos(p.angle)*bspd,vy:Math.sin(p.angle)*bspd,
      dmg:12*dmgMult,life:1.2,owner:'player',radius:5,color:'#4af'});
    spawnParticle(p.x,p.y,'#4af',3,4,0.15);
  }

  // Shield regen
  if(p.invTimer>0) p.invTimer-=dt;
  p.shieldTimer-=dt;
  if(p.shieldTimer<=0 && p.shield<p.maxShield){
    p.shield=Math.min(p.maxShield,p.shield+8*dt);
  }

  // Auto repair
  if(p.autoRepair){
    p.autoRepairTimer+=dt;
    if(p.autoRepairTimer>=1){ p.hull=Math.min(p.maxHull,p.hull+2); p.autoRepairTimer=0; }
  }

  // Item pickup
  for(const it of items){
    if(!it.collected && dist2(p,it)<(p.radius+it.radius)**2){
      collectItem(it);
    }
  }

  // Station proximity
  gs.nearStation=null;
  for(const st of stationsList){
    if(dist(p,st)<120){ gs.nearStation=st; break; }
  }

  // Death
  if(p.hull<=0){ p.hull=0; gs.state='dead'; gs.shopOpen=false; document.getElementById('shopModal').style.display='none'; }
}

function damagePlayer(dmg, msg){
  const p=player;
  if(p.invTimer>0) return;
  if(p.evasion && Math.random()<0.2){ setStatus('閃避！'); return; }
  if(p.shield>0){
    const absorbed=Math.min(p.shield,dmg);
    p.shield-=absorbed; dmg-=absorbed;
    p.shieldTimer=3;
  }
  if(dmg>0){ p.hull-=dmg; spawnParticle(p.x,p.y,'#f44',8,6,0.3); }
  p.invTimer=0.5;
  if(msg) setStatus(msg);
}

function collectItem(it){
  it.collected=true;
  const p=player;
  if(it.type==='energyCell'){ p.shield=Math.min(p.maxShield,p.shield+30); setStatus('護盾補充 +30'); }
  else if(it.type==='hullPlate'){ p.hull=Math.min(p.maxHull,p.hull+30); setStatus('船殼修復 +30'); }
  else if(it.type==='ore'){ const n=2+Math.floor(Math.random()*3+(p.lootFinder?1:0)); p.ore+=n; setStatus(`礦石 +${n}`); }
  else if(it.type==='crystal'){ const n=1+(p.lootFinder&&Math.random()<0.4?1:0); p.crystal+=n; setStatus(`晶體 +${n}`); }
  else if(it.type==='tech'){ p.tech+=1; setStatus('異星科技 +1'); }
  else if(it.type==='warpCore'){
    if(!p.collectedCores.has(it.id)){
      p.collectedCores.add(it.id);
      p.warpCores++;
      setStatus(`翹曲核心 ${p.warpCores}/5 — 繼續前進！`);
      spawnParticle(it.x,it.y,'#ffd700',20,10,0.8);
      if(p.warpCores>=5 && !escapePortal){
        escapePortal={x:PORTAL_POS.x,y:PORTAL_POS.y,radius:60,isPortal:true};
        setStatus('所有翹曲核心收集完畢！逃脫門戶已開啟！');
      }
    }
  }
  gs.score+=10;
}


// ── Enemy AI ──
function updateEnemies(dt){
  const p=player;
  for(const e of enemies){
    if(e.dead) continue;
    const dp=dist(p,e);
    // State transitions
    if(dp<350) e.state='chase';
    else if(dp>500) e.state='patrol';

    let tx=e.px, ty=e.py;
    if(e.state==='chase'||e.state==='attack'){
      tx=p.x; ty=p.y;
      if(dp<250) e.state='attack';
    }

    // Move toward target
    const ta=Math.atan2(ty-e.y,tx-e.x);
    e.angle=ta;
    if(dp>e.radius+20){
      e.vx+=(Math.cos(ta)*e.speed-e.vx)*dt*3;
      e.vy+=(Math.sin(ta)*e.speed-e.vy)*dt*3;
    } else {
      e.vx*=0.8; e.vy*=0.8;
    }
    e.x+=e.vx*dt; e.y+=e.vy*dt;

    // Melee (drone)
    if(e.type==='drone' && circlesOverlap(e,p)){
      if(p.invTimer<=0) damagePlayer(e.dmg*dt,'無人機撞擊！');
    }

    // Ranged attack
    if(e.rate>0 && e.state==='attack'){
      e.fireCd-=dt;
      if(e.fireCd<=0){
        e.fireCd=e.rate;
        const bspd=400;
        const col=e.type==='pirate'?'#ff8833':'#dd44ff';
        bullets.push({x:e.x,y:e.y,
          vx:Math.cos(ta)*bspd,vy:Math.sin(ta)*bspd,
          dmg:e.dmg,life:2,owner:'enemy',radius:5,color:col});
      }
    }
  }
}

// ── Bullets ──
function updateBullets(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if(b.life<=0){ bullets.splice(i,1); continue; }

    if(b.owner==='player'){
      // vs enemies
      let hit=false;
      for(const e of enemies){
        if(!e.dead && dist2(b,e)<(b.radius+e.radius)**2){
          e.hp-=b.dmg;
          spawnParticle(b.x,b.y,e.color,5,4,0.2);
          if(e.hp<=0){ e.dead=true; gs.score+=50;
            spawnParticle(e.x,e.y,'#ff8822',12,7,0.5);
            // Drop loot
            const rng=makeRng(Math.floor(e.x),Math.floor(e.y));
            items.push(makeItem(e.x+(rng()-0.5)*60,e.y+(rng()-0.5)*60,1,rng));
          }
          hit=true; break;
        }
      }
      // vs asteroids
      if(!hit){
        for(const a of asteroids){
          if(!a.dead && dist2(b,a)<(b.radius+a.radius)**2){
            a.hp--;
            spawnParticle(b.x,b.y,'#aa7755',4,3,0.2);
            if(a.hp<=0){
              a.dead=true; gs.score+=10;
              spawnParticle(a.x,a.y,'#886644',8,5,0.4);
              const rng=makeRng(Math.floor(a.x),Math.floor(a.y));
              for(let j=0;j<a.ore;j++)
                items.push({x:a.x+(rng()-0.5)*50,y:a.y+(rng()-0.5)*50,
                  type:'ore',color:'#cc8844',radius:10,bobT:rng()*Math.PI*2,collected:false});
            }
            hit=true; break;
          }
        }
      }
      if(hit){ bullets.splice(i,1); }
    } else {
      // Enemy bullet vs player
      if(circlesOverlap(b,player)){
        damagePlayer(b.dmg,'被擊中！');
        bullets.splice(i,1);
      }
    }
  }
}

// ── Particles ──
function spawnParticle(x,y,color,n,spd,life){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=(0.5+Math.random())*spd;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      color,life,maxLife:life,r:1.5+Math.random()*2.5});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92; p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }
}

// ── Black hole gravity ramp ──
function updateGravity(dt){
  gs.gravTimer+=dt;
  if(gs.gravTimer>=60){ gs.gravTimer=0; gs.gravity+=0.5; }
}

// ── Escape portal check ──
function checkEscape(){
  if(escapePortal && player.warpCores>=5){
    if(dist(player,escapePortal)<escapePortal.radius+player.radius){
      gs.state='win'; document.getElementById('shopModal').style.display='none';
    }
  }
}

// ── Helpers ──
function setStatus(msg){ gs.statusMsg=msg; gs.statusTimer=2.5; }

// ── Shop ──
const UPGRADES = [
  {id:'engine2',label:'引擎 Mk2',desc:'速度 +30%',cost:{ore:10},req:()=>player.engineLv<2,apply:()=>{player.engineLv=2;}},
  {id:'engine3',label:'引擎 Mk3',desc:'速度 +60%',cost:{ore:20,crystal:5},req:()=>player.engineLv<3,apply:()=>{player.engineLv=3;}},
  {id:'shield2',label:'護盾 Mk2',desc:'最大護盾 +40',cost:{ore:8},req:()=>player.shieldLv<2,apply:()=>{player.shieldLv=2;player.maxShield+=40;player.shield=Math.min(player.shield+40,player.maxShield);}},
  {id:'shield3',label:'護盾 Mk3',desc:'最大護盾 +80',cost:{ore:15,crystal:3},req:()=>player.shieldLv<3,apply:()=>{player.shieldLv=3;player.maxShield+=80;player.shield=Math.min(player.shield+80,player.maxShield);}},

function canAfford(cost){
  return (!cost.ore||player.ore>=cost.ore) && (!cost.crystal||player.crystal>=cost.crystal) && (!cost.tech||player.tech>=cost.tech);
}
function spendCost(cost){
  if(cost.ore) player.ore-=cost.ore;
  if(cost.crystal) player.crystal-=cost.crystal;
  if(cost.tech) player.tech-=cost.tech;
}
function costStr(cost){
  const parts=[];
  if(cost.ore) parts.push(`礦石×${cost.ore}`);
  if(cost.crystal) parts.push(`晶體×${cost.crystal}`);
  if(cost.tech) parts.push(`異星科技×${cost.tech}`);
  return parts.join(' + ');
}

let boughtUpgrades=new Set();
function openShop(){
  if(!gs.nearStation) return;
  gs.shopOpen=true;
  const grid=document.getElementById('shopGrid');
  grid.innerHTML='';
  UPGRADES.forEach((u,i)=>{
    const avail=u.req();
    const afford=canAfford(u.cost);
    const bought=boughtUpgrades.has(u.id)&&u.id!=='repair'&&u.id!=='shieldCharge';
    const div=document.createElement('div');
    div.className='shop-item'+(bought?' bought':(!afford?' cant-afford':''));
    div.innerHTML=`<h3>${u.label}</h3><p>${u.desc}</p><div class="cost">${costStr(u.cost)}</div>`;
    if(!bought && avail && afford){
      div.onclick=()=>{
        spendCost(u.cost); u.apply();
        if(u.id!=='repair'&&u.id!=='shieldCharge') boughtUpgrades.add(u.id);
        setStatus(`升級完成：${u.label}`);
        openShop();
      };
    }
    grid.appendChild(div);
  });
  document.getElementById('shopModal').style.display='block';
}
function closeShop(){ gs.shopOpen=false; document.getElementById('shopModal').style.display='none'; }
function toggleShop(){ if(gs.state!=='playing') return; gs.shopOpen?closeShop():openShop(); }
function togglePause(){ if(gs.state==='playing'){ gs.state='paused'; closeShop(); } else if(gs.state==='paused') gs.state='playing'; }


// ── Camera ──
const cam={x:0,y:0};
function updateCam(){
  cam.x=lerp(cam.x,player.x-W/2,0.12);
  cam.y=lerp(cam.y,player.y-H/2,0.12);
}

// ══════════ RENDERING ══════════

function drawStars(){
  const t=gs.playTime;
  for(let li=0;li<starLayers.length;li++){
    const layer=starLayers[li];
    const s=layer[0].s;
    ctx.fillStyle='#fff';
    for(const st of layer){
      const sx=((st.x-cam.x*s)%4000+4000)%4000;
      const sy=((st.y-cam.y*s)%4000+4000)%4000;
      ctx.globalAlpha=0.3+0.5*li/starLayers.length;
      ctx.beginPath(); ctx.arc(sx,sy,st.r,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

function drawBlackHole(){
  const bx=0-cam.x, by=0-cam.y;
  const r=200;
  // Glow rings
  for(let i=5;i>0;i--){
    const g=ctx.createRadialGradient(bx,by,r,bx,by,r+i*30);
    g.addColorStop(0,`rgba(80,0,160,${0.15/i})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(bx,by,r+i*30,0,Math.PI*2); ctx.fill();
  }
  // Core
  const cg=ctx.createRadialGradient(bx,by,0,bx,by,r);
  cg.addColorStop(0,'#000');
  cg.addColorStop(0.6,'#100020');
  cg.addColorStop(0.8,'#300050');
  cg.addColorStop(1,'rgba(80,0,120,0)');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(bx,by,r,0,Math.PI*2); ctx.fill();
  // Accretion ring
  ctx.save();
  ctx.translate(bx,by);
  const t=gs.playTime;
  for(let i=0;i<36;i++){
    const a=i/36*Math.PI*2+t*0.3;
    const ri=r+10+Math.sin(a*3+t)*8;
    ctx.globalAlpha=0.3+0.3*Math.sin(a*5+t*2);
    ctx.fillStyle=i%2===0?'#8800ff':'#ff4400';
    ctx.beginPath(); ctx.arc(Math.cos(a)*ri,Math.sin(a)*ri,3,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
  ctx.globalAlpha=1;
}

function drawAsteroids(){
  for(const a of asteroids){
    if(a.dead) continue;
    const ax=a.x-cam.x, ay=a.y-cam.y;
    if(ax<-100||ax>W+100||ay<-100||ay>H+100) continue;
    ctx.save(); ctx.translate(ax,ay); ctx.rotate(a.angle);
    ctx.beginPath();
    for(let i=0;i<a.pts.length;i++){
      const pt=a.pts[i];
      const px=Math.cos(pt.a)*pt.r, py=Math.sin(pt.a)*pt.r;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fillStyle='#5a4838'; ctx.fill();
    ctx.strokeStyle='#887766'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
    // HP bars on large asteroids
    if(a.hp<3+Math.floor(dist(player,a)/CHUNK)){
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.fillRect(ax-20,ay-a.radius-10,40,5);
      ctx.fillStyle='#88ff44';
      ctx.fillRect(ax-20,ay-a.radius-10,40*(a.hp/3),5);
    }
  }
}

function drawEnemies(){
  const t=gs.playTime;
  for(const e of enemies){
    if(e.dead) continue;
    const ex=e.x-cam.x, ey=e.y-cam.y;
    if(ex<-100||ex>W+100||ey<-100||ey>H+100) continue;
    ctx.save(); ctx.translate(ex,ey); ctx.rotate(e.angle);
    if(e.type==='drone'){
      // Hexagon drone
      ctx.beginPath();
      for(let i=0;i<6;i++){ const a=i/6*Math.PI*2; ctx.lineTo(Math.cos(a)*e.radius,Math.sin(a)*e.radius); }
      ctx.closePath();
      ctx.fillStyle='#223344'; ctx.fill();
      ctx.strokeStyle=e.color; ctx.lineWidth=2; ctx.stroke();
    } else if(e.type==='pirate'){
      // Arrow shape
      ctx.beginPath();
      ctx.moveTo(e.radius,0); ctx.lineTo(-e.radius,-e.radius*0.7);
      ctx.lineTo(-e.radius*0.5,0); ctx.lineTo(-e.radius,e.radius*0.7);
      ctx.closePath();
      ctx.fillStyle='#331a00'; ctx.fill();
      ctx.strokeStyle=e.color; ctx.lineWidth=2; ctx.stroke();
    } else {
      // Alien diamond
      ctx.beginPath();
      ctx.moveTo(e.radius*1.2,0); ctx.lineTo(0,-e.radius*0.8);
      ctx.lineTo(-e.radius*1.2,0); ctx.lineTo(0,e.radius*0.8);
      ctx.closePath();
      ctx.fillStyle='#1a0033'; ctx.fill();
      ctx.strokeStyle=e.color; ctx.lineWidth=2; ctx.stroke();
      // Eye glow
      ctx.globalAlpha=0.7;
      ctx.fillStyle=e.color;
      ctx.beginPath(); ctx.arc(e.radius*0.3,0,3,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    // HP bar
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(ex-e.radius,ey-e.radius-10,e.radius*2,5);
    ctx.fillStyle='#ff4444';
    ctx.fillRect(ex-e.radius,ey-e.radius-10,e.radius*2*(e.hp/e.maxHp),5);
    ctx.globalAlpha=1;
  }
}

function drawItems(){
  const t=gs.playTime;
  for(const it of items){
    if(it.collected) continue;
    const ix=it.x-cam.x, iy=it.y-cam.y+(Math.sin(it.bobT+t*1.5)*5);
    if(ix<-60||ix>W+60||iy<-60||iy>H+60) continue;
    // Outer glow
    const g=ctx.createRadialGradient(ix,iy,0,ix,iy,it.radius*2.5);
    g.addColorStop(0,it.color+'66'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ix,iy,it.radius*2.5,0,Math.PI*2); ctx.fill();
    // Core
    ctx.fillStyle=it.type==='warpCore'
      ? `hsl(${45+Math.sin(t*3)*15},100%,${55+Math.sin(t*5)*10}%)`
      : it.color;
    ctx.beginPath(); ctx.arc(ix,iy,it.radius,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.globalAlpha=0.4; ctx.lineWidth=1;
    ctx.stroke(); ctx.globalAlpha=1;
    // Icon
    ctx.fillStyle='#fff'; ctx.globalAlpha=0.9;
    ctx.font=`${it.type==='warpCore'?14:10}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const icons={energyCell:'⚡',hullPlate:'🛡',ore:'⛏',crystal:'💎',tech:'🔬',warpCore:'⭐'};
    ctx.fillText(icons[it.type]||'●',ix,iy);
    ctx.globalAlpha=1;
    // Label for warp cores
    if(it.type==='warpCore'){
      ctx.fillStyle='#ffd700'; ctx.font='bold 11px monospace';
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('翹曲核心',ix,iy+it.radius+4);
    }
  }
}

function drawStations(stationsList){
  const t=gs.playTime;
  for(const st of stationsList){
    const sx=st.x-cam.x, sy=st.y-cam.y;
    if(sx<-200||sx>W+200||sy<-200||sy>H+200) continue;
    if(st.isPortal){
      // Escape portal
      for(let i=3;i>0;i--){
        ctx.globalAlpha=0.2/i;
        ctx.fillStyle='#00ffaa';
        ctx.beginPath(); ctx.arc(sx,sy,st.radius+i*20,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;
      const ag=ctx.createRadialGradient(sx,sy,0,sx,sy,st.radius);
      ag.addColorStop(0,'#aaffdd'); ag.addColorStop(0.5,'#00ff88'); ag.addColorStop(1,'transparent');
      ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(sx,sy,st.radius,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#00ffaa'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(sx,sy,st.radius,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 12px monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('逃脫門戶',sx,sy);
    } else {
      // Space station
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(t*0.2);
      // Station body
      ctx.beginPath();
      for(let i=0;i<6;i++){ const a=i/6*Math.PI*2; ctx.lineTo(Math.cos(a)*st.radius,Math.sin(a)*st.radius); }
      ctx.closePath(); ctx.fillStyle='#0a1a2a'; ctx.fill();
      ctx.strokeStyle='#44aaff'; ctx.lineWidth=2; ctx.stroke();
      // Arms
      for(let i=0;i<3;i++){
        const a=i/3*Math.PI*2;
        ctx.strokeStyle='#44aaff'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(Math.cos(a)*st.radius,Math.sin(a)*st.radius);
        ctx.lineTo(Math.cos(a)*(st.radius+18),Math.sin(a)*(st.radius+18)); ctx.stroke();
        ctx.fillStyle='#0055aa';
        ctx.beginPath(); ctx.arc(Math.cos(a)*(st.radius+18),Math.sin(a)*(st.radius+18),6,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
      // Safe zone ring
      ctx.globalAlpha=0.08;
      ctx.fillStyle='#44aaff';
      ctx.beginPath(); ctx.arc(sx,sy,120,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.3;
      ctx.strokeStyle='#44aaff'; ctx.lineWidth=1; ctx.setLineDash([5,8]);
      ctx.beginPath(); ctx.arc(sx,sy,120,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha=1;
    }
  }
}

function drawPlayer(){
  const p=player;
  const px=p.x-cam.x, py=p.y-cam.y;
  // Engine glow
  if(keys['KeyW']||keys['ArrowUp']){
    const gt=ctx.createRadialGradient(px,py,0,px,py,22);
    gt.addColorStop(0,'rgba(100,200,255,0.6)'); gt.addColorStop(1,'transparent');
    ctx.fillStyle=gt; ctx.beginPath(); ctx.arc(px,py,22,0,Math.PI*2); ctx.fill();
    // Engine particles
    if(Math.random()<0.5) spawnParticle(
      p.x-Math.cos(p.angle)*14, p.y-Math.sin(p.angle)*14,
      '#88ccff',1,2,0.15);
  }
  ctx.save(); ctx.translate(px,py); ctx.rotate(p.angle);
  // Ship body (triangle with detail)
  ctx.beginPath();
  ctx.moveTo(18,0); ctx.lineTo(-12,-10); ctx.lineTo(-8,0); ctx.lineTo(-12,10);
  ctx.closePath();
  ctx.fillStyle='#0a2040'; ctx.fill();
  ctx.strokeStyle=p.invTimer>0?'#ff4444':'#4af'; ctx.lineWidth=2; ctx.stroke();
  // Cockpit
  ctx.fillStyle='#88ddff'; ctx.globalAlpha=0.8;
  ctx.beginPath(); ctx.arc(6,0,4,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.restore();
  // Shield ring
  if(p.shield>0){
    ctx.globalAlpha=0.2+(p.shield/p.maxShield)*0.2;
    ctx.strokeStyle='#44aaff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(px,py,p.radius+5,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
}

function drawBullets(){
  for(const b of bullets){
    const bx=b.x-cam.x, by=b.y-cam.y;
    ctx.beginPath();
    ctx.arc(bx,by,b.radius*0.5,0,Math.PI*2);
    ctx.fillStyle=b.color; ctx.fill();
    // Glow
    const g=ctx.createRadialGradient(bx,by,0,bx,by,b.radius*2);
    g.addColorStop(0,b.color+'99'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(bx,by,b.radius*2,0,Math.PI*2); ctx.fill();
  }
}

function drawParticles(){
  for(const p of particles){
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x-cam.x,p.y-cam.y,p.r*alpha,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}


// ── HUD ──
function drawHUD(){
  const p=player;
  ctx.save();

  // Top-left: bars
  const bw=180, bh=14, bx=18, by=18;
  // Hull
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
  ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#ee4444'; ctx.fillRect(bx,by,bw*(p.hull/p.maxHull),bh);
  ctx.fillStyle='#fff'; ctx.font='bold 11px monospace'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(`船殼 ${Math.ceil(p.hull)}/${p.maxHull}`,bx+4,by+bh/2);
  // Shield
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-2,by+bh+4,bw+4,bh+4);
  ctx.fillStyle='#222'; ctx.fillRect(bx,by+bh+6,bw,bh);
  ctx.fillStyle='#2288ff'; ctx.fillRect(bx,by+bh+6,bw*(p.shield/p.maxShield),bh);
  ctx.fillStyle='#aaddff'; ctx.fillText(`護盾 ${Math.ceil(p.shield)}/${p.maxShield}`,bx+4,by+bh+6+bh/2);
  // Resources
  const resy=by+bh*2+20;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(bx-2,resy-2,bw+4,56);
  ctx.font='13px monospace'; ctx.textBaseline='top';
  ctx.fillStyle='#cc8844'; ctx.fillText(`⛏ 礦石: ${p.ore}`,bx+4,resy+2);
  ctx.fillStyle='#cc44ff'; ctx.fillText(`💎 晶體: ${p.crystal}`,bx+4,resy+18);
  ctx.fillStyle='#ffff44'; ctx.fillText(`🔬 異星科技: ${p.tech}`,bx+4,resy+34);

  // Top-center: Warp core progress
  const wbx=W/2-80, wby=14;
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(wbx-8,wby-4,176,36);
  ctx.font='bold 11px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillStyle='#aaa'; ctx.fillText('翹曲核心',W/2,wby);
  for(let i=0;i<5;i++){
    const cx2=wbx+i*32+16, cy2=wby+22;
    ctx.fillStyle=i<p.warpCores?'#ffd700':'#333';
    ctx.beginPath(); ctx.arc(cx2,cy2,12,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=i<p.warpCores?'#ffaa00':'#555'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx2,cy2,12,0,Math.PI*2); ctx.stroke();
    if(i<p.warpCores){ ctx.fillStyle='#000'; ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('⭐',cx2,cy2); }
    else { ctx.fillStyle='#555'; ctx.font='12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText((i+1).toString(),cx2,cy2); }
  }

  // Minimap (top-right)
  const mx=W-220, my=14, mw=200, mh=160;
  ctx.fillStyle='rgba(0,5,15,0.75)'; ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle='#1a4a6a'; ctx.lineWidth=1; ctx.strokeRect(mx,my,mw,mh);
  const mmScale=mw/3000; // 3000 world units = minimap width
  const mmOx=player.x-1500, mmOy=player.y-(mh/2/mmScale);
  // Black hole on minimap
  const bhmmx=mx+(0-mmOx)*mmScale, bhmmy=my+(0-mmOy)*mmScale;
  if(bhmmx>mx-10&&bhmmx<mx+mw+10&&bhmmy>my-10&&bhmmy<my+mh+10){
    ctx.fillStyle='#6600cc'; ctx.beginPath(); ctx.arc(clamp(bhmmx,mx,mx+mw),clamp(bhmmy,my,my+mh),6,0,Math.PI*2); ctx.fill();
  }
  // Enemies
  ctx.fillStyle='#ff4444';
  for(const e of enemies){ if(e.dead) continue;
    const ex2=mx+(e.x-mmOx)*mmScale, ey2=my+(e.y-mmOy)*mmScale;
    if(ex2>mx&&ex2<mx+mw&&ey2>my&&ey2<my+mh){ ctx.beginPath(); ctx.arc(ex2,ey2,2,0,Math.PI*2); ctx.fill(); }
  }
  // Items
  ctx.fillStyle='#00ccff';
  for(const it of items){ if(it.collected) continue;
    const imx=mx+(it.x-mmOx)*mmScale, imy=my+(it.y-mmOy)*mmScale;
    if(imx>mx&&imx<mx+mw&&imy>my&&imy<my+mh){
      ctx.fillStyle=it.type==='warpCore'?'#ffd700':'#00ccff';
      ctx.beginPath(); ctx.arc(imx,imy,it.type==='warpCore'?4:2,0,Math.PI*2); ctx.fill();
    }
  }
  // Portal on minimap
  if(escapePortal){
    const pmx=mx+(escapePortal.x-mmOx)*mmScale, pmy=my+(escapePortal.y-mmOy)*mmScale;
    if(pmx>mx-6&&pmx<mx+mw+6&&pmy>my-6&&pmy<my+mh+6){
      ctx.fillStyle='#00ffaa'; ctx.beginPath(); ctx.arc(clamp(pmx,mx,mx+mw),clamp(pmy,my,my+mh),5,0,Math.PI*2); ctx.fill();
    }
  }
  // Player dot
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(mx+mw/2,my+mh/2,4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#4af'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(mx+mw/2,my+mh/2,4,0,Math.PI*2); ctx.stroke();
  // Minimap label
  ctx.fillStyle='#446'; ctx.font='10px monospace'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('RADAR',mx+4,my+4);
  // Score
  ctx.fillStyle='#888'; ctx.font='11px monospace'; ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillText(`分數 ${gs.score}`,mx+mw-4,my+mh-14);

  // Near station prompt
  if(gs.nearStation && !gs.nearStation.isPortal && !gs.shopOpen){
    ctx.fillStyle='rgba(0,30,60,0.85)'; ctx.fillRect(W/2-120,H-60,240,36);
    ctx.strokeStyle='#4af'; ctx.lineWidth=1; ctx.strokeRect(W/2-120,H-60,240,36);
    ctx.fillStyle='#adf'; ctx.font='bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('[E] 進入太空站補給',W/2,H-42);
  }
  if(gs.nearStation && gs.nearStation.isPortal){
    ctx.fillStyle='rgba(0,60,30,0.85)'; ctx.fillRect(W/2-140,H-60,280,36);
    ctx.strokeStyle='#0fa'; ctx.lineWidth=1; ctx.strokeRect(W/2-140,H-60,280,36);
    ctx.fillStyle='#afffdd'; ctx.font='bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⭐ 接近門戶以逃脫！',W/2,H-42);
  }

  // Status message
  if(gs.statusTimer>0){
    ctx.globalAlpha=Math.min(1,gs.statusTimer);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(W/2-160,H/2-10+60,320,28);
    ctx.fillStyle='#fff'; ctx.font='bold 14px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(gs.statusMsg,W/2,H/2+4+60);
    ctx.globalAlpha=1;
  }

  // Gravity warning
  if(gs.gravity>3){
    const d=dist(player,{x:0,y:0});
    if(d<2000){
      ctx.globalAlpha=0.6+0.3*Math.sin(gs.playTime*4);
      ctx.fillStyle='#ff4444'; ctx.font='bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('⚠ 黑洞引力增強，請遠離中心！',W/2,58);
      ctx.globalAlpha=1;
    }
  }

  ctx.restore();
}

// ── Screen overlays ──
function drawTitle(){
  ctx.fillStyle='rgba(0,0,10,0.85)'; ctx.fillRect(0,0,W,H);
  // Title
  ctx.shadowBlur=30; ctx.shadowColor='#4af';
  ctx.fillStyle='#aaddff'; ctx.font=`bold ${clamp(W/15,32,56)}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('虛空領航員',W/2,H/2-120);
  ctx.shadowBlur=10; ctx.fillStyle='#446688'; ctx.font=`${clamp(W/30,16,22)}px monospace`;
  ctx.fillText('VOID NAVIGATOR',W/2,H/2-78);
  ctx.shadowBlur=0;
  // Story
  ctx.fillStyle='#8899aa'; ctx.font='14px monospace';
  const lines=['領航員陳，你被黑洞吸入了未知的銀河！','駕駛你的太空艇，蒐集5個翹曲核心，逃離這裡！','','操作：WASD移動  滑鼠瞄準  左鍵射擊  E進入太空站'];
  lines.forEach((l,i)=>ctx.fillText(l,W/2,H/2-20+i*26));
  // Start prompt (pulsing)
  ctx.globalAlpha=0.6+0.4*Math.sin(gs.time*3);
  ctx.fillStyle='#4af'; ctx.font='bold 16px monospace';
  ctx.fillText('按 ENTER 或點擊開始遊戲',W/2,H/2+120);
  ctx.globalAlpha=1;
}

function drawPaused(){
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.font='bold 36px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⏸ 暫停',W/2,H/2-20);
  ctx.fillStyle='#678'; ctx.font='16px monospace';
  ctx.fillText('按 ESC 繼續',W/2,H/2+24);
}

function drawDead(){
  ctx.fillStyle='rgba(20,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ff4444'; ctx.font='bold 40px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('太空艇毀滅',W/2,H/2-80);
  ctx.fillStyle='#aa6666'; ctx.font='18px monospace';
  ctx.fillText('任務失敗',W/2,H/2-30);
  ctx.fillStyle='#888'; ctx.font='14px monospace';
  ctx.fillText(`翹曲核心: ${player.warpCores}/5   分數: ${gs.score}`,W/2,H/2+10);
  ctx.fillText(`探索時間: ${Math.floor(gs.playTime/60)}分${Math.floor(gs.playTime%60)}秒`,W/2,H/2+36);
  ctx.globalAlpha=0.6+0.4*Math.sin(gs.time*3);
  ctx.fillStyle='#aaa'; ctx.font='bold 16px monospace';
  ctx.fillText('按 ENTER 重新開始',W/2,H/2+80);
  ctx.globalAlpha=1;
}

function drawWin(){
  ctx.fillStyle='rgba(0,20,10,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.shadowBlur=40; ctx.shadowColor='#00ffaa';
  ctx.fillStyle='#00ffaa'; ctx.font='bold 40px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('你逃出去了！',W/2,H/2-80);
  ctx.shadowBlur=0;
  ctx.fillStyle='#aaffdd'; ctx.font='22px monospace';
  ctx.fillText('成功返回地球！',W/2,H/2-30);
  ctx.fillStyle='#88aa99'; ctx.font='15px monospace';
  ctx.fillText(`探索時間: ${Math.floor(gs.playTime/60)}分${Math.floor(gs.playTime%60)}秒   最終分數: ${gs.score}`,W/2,H/2+20);
  ctx.globalAlpha=0.6+0.4*Math.sin(gs.time*2);
  ctx.fillStyle='#afffdd'; ctx.font='bold 16px monospace';
  ctx.fillText('按 ENTER 再玩一次',W/2,H/2+80);
  ctx.globalAlpha=1;
}


// ── Game init ──
function startGame(){
  player=makePlayer();
  chunks.clear(); bullets=[]; particles=[]; boughtUpgrades.clear();
  warpCoreItems=WARP_POSITIONS.map((p,i)=>({x:p.x,y:p.y,type:'warpCore',radius:18,id:i,collected:false,bobT:Math.random()*Math.PI*2}));
  escapePortal=null;
  gs.state='playing'; gs.playTime=0; gs.score=0; gs.gravity=0; gs.gravTimer=0;
  gs.statusMsg=''; gs.statusTimer=0; gs.shopOpen=false;
  document.getElementById('shopModal').style.display='none';
  setStatus('找到5個翹曲核心，逃離黑洞！');
}

// ── Main loop ──
let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/1000,0.05);
  lastT=t;
  gs.time+=dt;

  ctx.fillStyle='#000010'; ctx.fillRect(0,0,W,H);
  drawStars();
  drawBlackHole();

  if(gs.state==='title'){
    drawTitle();
  } else {
    if(gs.state==='playing' && !gs.shopOpen){
      gs.playTime+=dt;
      updateGravity(dt);
      const stationsList=updateChunks();
      updatePlayer(dt,stationsList);
      updateEnemies(dt);
      updateBullets(dt);
      updateParticles(dt);
      checkEscape();
      if(gs.statusTimer>0) gs.statusTimer-=dt;
      updateCam();
    } else if(gs.state==='playing' && gs.shopOpen){
      // Camera still updates when shop open
      updateCam();
    }

    // Draw world
    drawAsteroids();
    const stList2=updateChunks();
    drawStations(stList2);
    drawItems();
    drawEnemies();
    drawBullets();
    drawParticles();
    drawPlayer();
    drawHUD();

    if(gs.state==='paused') drawPaused();
    if(gs.state==='dead')   drawDead();
    if(gs.state==='win')    drawWin();

    // Win particles
    if(gs.state==='win' && Math.random()<0.3){
      spawnParticle(Math.random()*W+cam.x,Math.random()*H+cam.y,'#00ffaa',3,8,1);
    }
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(t=>{ lastT=t; loop(t); });
</script>
