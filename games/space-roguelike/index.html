<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虛空領航員 — Void Navigator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000010; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
canvas { display: block; }
#ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#shop-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(5,10,30,0.95); border: 1px solid #2244aa; border-radius: 12px;
  padding: 24px; width: 480px; max-height: 80vh; overflow-y: auto;
  display: none; pointer-events: all; z-index: 100;
  box-shadow: 0 0 40px rgba(50,100,255,0.4);
}
#shop-overlay h2 { text-align: center; color: #88ccff; margin-bottom: 8px; font-size: 20px; }
#shop-overlay .resources { text-align: center; color: #aaa; margin-bottom: 16px; font-size: 13px; }
#shop-overlay .section-title { color: #ffcc44; margin: 12px 0 6px; font-size: 13px; border-bottom: 1px solid #333; padding-bottom: 4px; }
.shop-item { display: flex; justify-content: space-between; align-items: center;
  padding: 7px 10px; margin: 4px 0; border-radius: 6px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08); transition: background 0.1s; }
.shop-item:hover { background: rgba(255,255,255,0.09); }
.shop-item .item-name { font-size: 13px; color: #ddd; }
.shop-item .item-cost { font-size: 12px; color: #aaa; }
.shop-item button { background: #1a3a6a; border: 1px solid #2255aa; color: #88ccff;
  padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; pointer-events: all; }
.shop-item button:hover:not(:disabled) { background: #2255aa; }
.shop-item button:disabled { opacity: 0.4; cursor: not-allowed; }
#shop-close { display: block; margin: 16px auto 0; background: #aa2222; border: none;
  color: #fff; padding: 8px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; }
#shop-close:hover { background: #cc3333; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="shop-overlay">
    <h2>太空站補給</h2>
    <div class="resources" id="shop-resources"></div>
    <div class="section-title">船艦升級</div>
    <div id="shop-upgrades"></div>
    <div class="section-title">領航員天賦</div>
    <div id="shop-perks"></div>
    <button id="shop-close">離開 (E)</button>
  </div>
</div>
<script>
'use strict';

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const CHUNK = 1800;
const DRAG = 0.88;
const BULLET_SPEED = 650;
const BULLET_LIFE = 1.2;
const BULLET_DMG = 12;
const FIRE_RATE = 0.22;
const SHIELD_REGEN = 8;
const SHIELD_REGEN_DELAY = 3;
const BH_RADIUS = 200;
const BH_DMG = 50;

const WARP_CORE_POSITIONS = [
  {x:7500,y:2500},{x:-6500,y:5500},{x:3500,y:-8500},
  {x:-5500,y:-4500},{x:9000,y:-5500}
];
const ESCAPE_PORTAL_POS = {x:12000,y:0};

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = 'title'; // title, playing, paused, shop, gameover, victory
let gameTime = 0;
let playTime = 0;
let statusMsg = '';
let statusTimer = 0;
let shopStation = null;

// ─── RNG ──────────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function chunkSeed(cx, cy) {
  return (cx * 73856093) ^ (cy * 19349663) ^ 0xDEADBEEF;
}

// ─── STARFIELD ────────────────────────────────────────────────────────────────
const stars = [];
(function initStars() {
  const rng = mulberry32(42);
  const layers = [{n:200,speed:0.1,sz:1},{n:100,speed:0.25,sz:1.5},{n:50,speed:0.5,sz:2}];
  for (const l of layers) {
    for (let i = 0; i < l.n; i++) {
      stars.push({
        x: rng()*4000-2000, y: rng()*4000-2000,
        speed: l.speed, sz: l.sz,
        brightness: 0.4+rng()*0.6
      });
    }
  }
})();

// ─── PLAYER ──────────────────────────────────────────────────────────────────
let player;
function createPlayer() {
  return {
    x: 600, y: 0, vx: 0, vy: 0,
    angle: 0,
    hull: 100, maxHull: 100,
    shield: 60, maxShield: 60,
    fireTimer: 0,
    invulTimer: 0,
    shieldCooldown: 0,
    ore: 0, crystal: 0, alienTech: 0,
    warpCores: 0,
    warpCoreSet: new Set(),
    // upgrades
    engineLevel: 1,
    shieldLevel: 1,
    hullLevel: 1,
    weaponLevel: 1,
    // perks
    deepScanner: false,
    lootFinder: false,
    combatExpert: false,
    evasion: false,
    autoRepair: false,
    thrustForce: 280,
    escaped: false
  };
}

// ─── WORLD CHUNKS ─────────────────────────────────────────────────────────────
const chunks = new Map();
const loadedChunks = new Set();

function chunkKey(cx, cy) { return cx+','+cy; }

function distTier(cx, cy) {
  return Math.floor(Math.sqrt(cx*cx+cy*cy) / 3);
}

function generateChunk(cx, cy) {
  const key = chunkKey(cx, cy);
  if (chunks.has(key)) return;
  const rng = mulberry32(chunkSeed(cx, cy));
  const tier = distTier(cx, cy);
  const ox = cx * CHUNK, oy = cy * CHUNK;

  const asteroids = [];
  const numAst = Math.floor(rng()*8)+5;
  for (let i = 0; i < numAst; i++) {
    const ax = ox + rng()*CHUNK;
    const ay = oy + rng()*CHUNK;
    const r = 20 + rng()*40;
    const verts = [];
    const nv = Math.floor(rng()*4)+6;
    for (let v = 0; v < nv; v++) {
      const a = (v/nv)*Math.PI*2;
      const d = r*(0.6+rng()*0.4);
      verts.push({x:Math.cos(a)*d, y:Math.sin(a)*d});
    }
    asteroids.push({x:ax,y:ay,r:r,verts,hp:Math.floor(r*2),maxHp:Math.floor(r*2),
      color:`hsl(${25+rng()*20},${20+rng()*20}%,${30+rng()*20}%)`});
  }

  const enemies = [];
  const maxEnemies = Math.min(4, Math.floor(rng()*(4+tier)));
  const numEnemies = Math.floor(rng()*maxEnemies);
  const types = ['drone','pirate','alien'];
  for (let i = 0; i < numEnemies; i++) {
    const ex = ox + rng()*CHUNK;
    const ey = oy + rng()*CHUNK;
    const typeIdx = Math.floor(rng()*Math.min(3,1+Math.floor(tier/2)));
    const t = types[typeIdx];
    const scale = 1 + tier*0.15;
    let hp, speed, dmg, fr, r, color;
    if (t==='drone')  {hp=30*scale;speed=95;dmg=10*scale;fr=0;r=14;color='#88aacc';}
    if (t==='pirate') {hp=55*scale;speed=130;dmg=12*scale;fr=1.8;r=15;color='#ff8833';}
    if (t==='alien')  {hp=80*scale;speed=155;dmg=20*scale;fr=1.2;r=17;color='#aa44ff';}
    enemies.push({x:ex,y:ey,vx:0,vy:0,type:t,hp:Math.ceil(hp),maxHp:Math.ceil(hp),
      speed,dmg:Math.ceil(dmg),fireRate:fr,fireTimer:rng()*fr,r,color,
      state:'patrol',patrolAngle:rng()*Math.PI*2,patrolTimer:0,
      angle:rng()*Math.PI*2,alive:true});
  }

  const items = [];
  const numItems = Math.floor(rng()*4)+1;
  const itemTypes = ['energy','hull','ore','crystal','alientech'];
  for (let i = 0; i < numItems; i++) {
    const ix = ox + rng()*CHUNK;
    const iy = oy + rng()*CHUNK;
    const it = itemTypes[Math.floor(rng()*itemTypes.length)];
    items.push({x:ix,y:iy,type:it,r:12,bobOffset:rng()*Math.PI*2,alive:true});
  }

  // Warp cores at fixed positions
  for (const wcp of WARP_CORE_POSITIONS) {
    const wcx = Math.floor(wcp.x/CHUNK), wcy = Math.floor(wcp.y/CHUNK);
    if (wcx===cx && wcy===cy) {
      items.push({x:wcp.x,y:wcp.y,type:'warpcore',r:16,bobOffset:0,alive:true,
        id:`${wcp.x},${wcp.y}`});
    }
  }

  let station = null;
  if (rng() < 0.125 && (cx!==0||cy!==0)) {
    station = {
      x: ox + 200+rng()*(CHUNK-400),
      y: oy + 200+rng()*(CHUNK-400),
      r: 30, alive: true,
      angle: rng()*Math.PI*2
    };
  }

  let portal = null;
  const pcx = Math.floor(ESCAPE_PORTAL_POS.x/CHUNK);
  const pcy = Math.floor(ESCAPE_PORTAL_POS.y/CHUNK);
  if (pcx===cx && pcy===cy) {
    portal = {x:ESCAPE_PORTAL_POS.x, y:ESCAPE_PORTAL_POS.y, r:50, active:false};
  }

  chunks.set(key, {cx,cy,asteroids,enemies,items,station,portal,generated:true});
}

function getChunksAround(wx, wy, radius) {
  const result = [];
  const r = Math.ceil(radius/CHUNK)+1;
  const ccx = Math.floor(wx/CHUNK), ccy = Math.floor(wy/CHUNK);
  for (let dx=-r;dx<=r;dx++) for (let dy=-r;dy<=r;dy++) {
    result.push({cx:ccx+dx,cy:ccy+dy});
  }
  return result;
}

// ─── BULLETS ─────────────────────────────────────────────────────────────────
let bullets = [];
let enemyBullets = [];
let particles = [];

function spawnBullet(x,y,angle,speed,dmg,owner='player') {
  const b = {x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
    life:BULLET_LIFE,dmg,owner,r:4};
  if (owner==='player') bullets.push(b);
  else enemyBullets.push(b);
}

function spawnParticle(x,y,vx,vy,life,color,r) {
  particles.push({x,y,vx,vy,life,maxLife:life,color,r});
}

function explosion(x,y,n,color) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const s = 50+Math.random()*150;
    spawnParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,0.3+Math.random()*0.5,color,2+Math.random()*3);
  }
}

// ─── ENGINE TRAIL ─────────────────────────────────────────────────────────────
let engineTrail = [];

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {};
const mouse = {x:W/2,y:H/2,down:false};

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code==='Escape') {
    if (state==='playing') state='paused';
    else if (state==='paused') state='playing';
    else if (state==='shop') { closeShop(); state='playing'; }
  }
  if (e.code==='Enter') {
    if (state==='title') startGame();
    else if (state==='gameover'||state==='victory') startGame();
  }
  if (e.code==='KeyE') {
    if (state==='playing') tryOpenShop();
    else if (state==='shop') { closeShop(); state='playing'; }
  }
  if (e.code==='Space' && state==='playing') {
    mouse.down = true;
  }
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code==='Space') mouse.down = false;
});
canvas.addEventListener('mousemove', e => { mouse.x=e.clientX; mouse.y=e.clientY; });
canvas.addEventListener('mousedown', e => { if(e.button===0) mouse.down=true; });
canvas.addEventListener('mouseup', e => { if(e.button===0) mouse.down=false; });
canvas.addEventListener('click', e => {
  if (state==='title') startGame();
});

// ─── SHOP ─────────────────────────────────────────────────────────────────────
const shopOverlay = document.getElementById('shop-overlay');
const shopResources = document.getElementById('shop-resources');
const shopUpgrades = document.getElementById('shop-upgrades');
const shopPerks = document.getElementById('shop-perks');
document.getElementById('shop-close').addEventListener('click', () => {
  closeShop(); state='playing';
});

function tryOpenShop() {
  let nearest = null, nd = Infinity;
  for (const [,chunk] of chunks) {
    if (chunk.station&&chunk.station.alive) {
      const d = dist(player.x,player.y,chunk.station.x,chunk.station.y);
      if (d<80&&d<nd) { nd=d; nearest=chunk.station; }
    }
  }
  if (nearest) { shopStation=nearest; openShop(); state='shop'; }
}

function openShop() {
  shopOverlay.style.display='block';
  renderShop();
}
function closeShop() {
  shopOverlay.style.display='none';
  shopStation=null;
}
function renderShop() {
  shopResources.textContent=`礦石: ${player.ore} | 晶體: ${player.crystal} | 異星科技: ${player.alienTech}`;

  const upgrades = [
    {name:'引擎 Mk2 (速度+25%)',cost:{ore:10},req:()=>player.engineLevel<2,
      buy:()=>{player.engineLevel=2;player.thrustForce=350;}},
    {name:'引擎 Mk3 (速度+55%)',cost:{ore:20,crystal:5},req:()=>player.engineLevel<3,
      buy:()=>{player.engineLevel=3;player.thrustForce=434;}},
    {name:'護盾產生器 Mk2 (+40護盾)',cost:{ore:8},req:()=>player.shieldLevel<2,
      buy:()=>{player.shieldLevel=2;player.maxShield+=40;player.shield=Math.min(player.shield+40,player.maxShield);}},
    {name:'護盾產生器 Mk3 (+80護盾)',cost:{ore:15,crystal:3},req:()=>player.shieldLevel<3,
      buy:()=>{player.shieldLevel=3;player.maxShield+=40;player.shield=Math.min(player.shield+40,player.maxShield);}},
    {name:'船殼加固 Mk2 (+40船殼)',cost:{ore:10},req:()=>player.hullLevel<2,
      buy:()=>{player.hullLevel=2;player.maxHull+=40;player.hull=Math.min(player.hull+40,player.maxHull);}},
    {name:'船殼加固 Mk3 (+80船殼)',cost:{ore:18},req:()=>player.hullLevel<3,
      buy:()=>{player.hullLevel=3;player.maxHull+=40;player.hull=Math.min(player.hull+40,player.maxHull);}},
    {name:'武器系統 Mk2 (傷害+35%)',cost:{ore:12},req:()=>player.weaponLevel<2,
      buy:()=>{player.weaponLevel=2;}},
    {name:'武器系統 Mk3 (傷害+75%)',cost:{ore:22,crystal:5},req:()=>player.weaponLevel<3,
      buy:()=>{player.weaponLevel=3;}},
    {name:'緊急維修 (船殼恢復)',cost:{ore:15},req:()=>player.hull<player.maxHull,
      buy:()=>{player.hull=player.maxHull;}},
    {name:'護盾充能 (護盾恢復)',cost:{ore:8},req:()=>player.shield<player.maxShield,
      buy:()=>{player.shield=player.maxShield;}},
  ];
  const perks = [
    {name:'深度掃描器 (掃描範圍x2)',cost:{crystal:10},req:()=>!player.deepScanner,
      buy:()=>{player.deepScanner=true;}},
    {name:'戰利品探測 (物品品質+30%)',cost:{crystal:8},req:()=>!player.lootFinder,
      buy:()=>{player.lootFinder=true;}},
    {name:'戰鬥專家 (射速+30%)',cost:{ore:10,crystal:5},req:()=>!player.combatExpert,
      buy:()=>{player.combatExpert=true;}},
    {name:'迴避訓練 (20%閃避)',cost:{crystal:15},req:()=>!player.evasion,
      buy:()=>{player.evasion=true;}},
    {name:'自動修復 (船殼緩慢回復)',cost:{crystal:20,ore:10},req:()=>!player.autoRepair,
      buy:()=>{player.autoRepair=true;}},
  ];

  function renderItems(container, list) {
    container.innerHTML='';
    for (const item of list) {
      if (!item.req()) continue;
      const canAfford = canBuy(item.cost);
      const div = document.createElement('div');
      div.className='shop-item';
      const costStr = Object.entries(item.cost).map(([k,v])=>{
        const labels={ore:'礦石',crystal:'晶體',alienTech:'異星科技'};
        return `${labels[k]||k}x${v}`;
      }).join(' + ');
      div.innerHTML=`<span class="item-name">${item.name}</span>
        <span class="item-cost">${costStr}</span>
        <button ${canAfford?'':'disabled'}>購買</button>`;
      div.querySelector('button').addEventListener('click', () => {
        if (canBuy(item.cost)) {
          spendResources(item.cost);
          item.buy();
          setStatus('購買成功！');
          renderShop();
        }
      });
      container.appendChild(div);
    }
  }
  renderItems(shopUpgrades, upgrades);
  renderItems(shopPerks, perks);
}

function canBuy(cost) {
  if (cost.ore&&player.ore<cost.ore) return false;
  if (cost.crystal&&player.crystal<cost.crystal) return false;
  if (cost.alienTech&&player.alienTech<cost.alienTech) return false;
  return true;
}
function spendResources(cost) {
  if (cost.ore) player.ore-=cost.ore;
  if (cost.crystal) player.crystal-=cost.crystal;
  if (cost.alienTech) player.alienTech-=cost.alienTech;
}

// ─── GAME INIT ────────────────────────────────────────────────────────────────
function startGame() {
  player = createPlayer();
  bullets = []; enemyBullets = []; particles = []; engineTrail = [];
  chunks.clear();
  gameTime = 0; playTime = 0;
  statusMsg = ''; statusTimer = 0;
  state = 'playing';
  setStatus('領航員陳，加油！蒐集5個翹曲核心！');
}

function setStatus(msg) { statusMsg=msg; statusTimer=3; }
function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)**2+(y2-y1)**2); }
function dist2(x1,y1,x2,y2) { return (x2-x1)**2+(y2-y1)**2; }
function lerp(a,b,t) { return a+(b-a)*t; }
function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }

// ─── UPDATE ───────────────────────────────────────────────────────────────────
let lastTime = 0;
function update(dt) {
  if (state!=='playing'&&state!=='shop') return;
  gameTime+=dt;
  if (state==='playing') playTime+=dt;

  // Load chunks
  const scanRange = player.deepScanner ? 2 : 1;
  const nearChunks = getChunksAround(player.x,player.y,CHUNK*(scanRange+1));
  for (const {cx,cy} of nearChunks) generateChunk(cx,cy);

  updatePlayer(dt);
  updateBullets(dt);
  updateEnemyBullets(dt);
  updateEnemies(dt);
  updateItems(dt);
  updatePortal(dt);
  updateParticles(dt);
  updateBlackHole(dt);

  // Status timer
  if (statusTimer>0) statusTimer-=dt;
}

function getPlayerDmg() {
  const base = BULLET_DMG;
  if (player.weaponLevel===2) return Math.floor(base*1.35);
  if (player.weaponLevel===3) return Math.floor(base*1.75);
  return base;
}
function getPlayerFireRate() {
  let fr = FIRE_RATE;
  if (player.combatExpert) fr*=0.7;
  return fr;
}

function updatePlayer(dt) {
  const thrust = player.thrustForce;
  const up = keys['KeyW']||keys['ArrowUp'];
  const down = keys['KeyS']||keys['ArrowDown'];
  const left = keys['KeyA']||keys['ArrowLeft'];
  const right = keys['KeyD']||keys['ArrowRight'];

  if (up)    player.vy -= thrust*dt;
  if (down)  player.vy += thrust*dt;
  if (left)  player.vx -= thrust*dt;
  if (right) player.vx += thrust*dt;

  // Aim at mouse
  const sx = player.x - player.x + W/2;
  const sy = player.y - player.y + H/2;
  player.angle = Math.atan2(mouse.y-H/2, mouse.x-W/2);

  // Engine trail
  if (up||down||left||right) {
    const ta = player.angle+Math.PI + (Math.random()-0.5)*0.4;
    engineTrail.push({
      x:player.x+Math.cos(ta)*18,y:player.y+Math.sin(ta)*18,
      vx:(Math.random()-0.5)*30,vy:(Math.random()-0.5)*30,
      life:0.3,maxLife:0.3,color:`hsl(${200+Math.random()*30},100%,${60+Math.random()*20}%)`
    });
  }

  // Drag
  player.vx *= DRAG;
  player.vy *= DRAG;

  // Clamp max speed
  const spd = Math.sqrt(player.vx**2+player.vy**2);
  const maxSpd = 400;
  if (spd>maxSpd) { player.vx*=maxSpd/spd; player.vy*=maxSpd/spd; }

  player.x += player.vx*dt;
  player.y += player.vy*dt;

  // Collision with asteroids
  for (const [,chunk] of chunks) {
    for (const ast of chunk.asteroids) {
      const d = dist(player.x,player.y,ast.x,ast.y);
      if (d < 22+ast.r) {
        const nx=(player.x-ast.x)/d, ny=(player.y-ast.y)/d;
        player.x = ast.x+nx*(22+ast.r);
        player.y = ast.y+ny*(22+ast.r);
        const dot = player.vx*nx+player.vy*ny;
        if (dot<0) { player.vx-=dot*nx*1.5; player.vy-=dot*ny*1.5; }
        if (player.invulTimer<=0) {
          damagePlayer(8);
          explosion(player.x,player.y,5,'#888888');
        }
      }
    }
  }

  // Fire
  if (player.fireTimer>0) player.fireTimer-=dt;
  if (mouse.down && player.fireTimer<=0) {
    player.fireTimer = getPlayerFireRate();
    spawnBullet(player.x,player.y,player.angle,BULLET_SPEED,getPlayerDmg(),'player');
    // Muzzle flash
    spawnParticle(player.x+Math.cos(player.angle)*25,player.y+Math.sin(player.angle)*25,
      Math.cos(player.angle)*80,Math.sin(player.angle)*80,0.08,'#ffffaa',6);
  }

  // Invul timer
  if (player.invulTimer>0) player.invulTimer-=dt;

  // Shield regen
  if (player.shieldCooldown>0) player.shieldCooldown-=dt;
  else if (player.shield<player.maxShield) {
    player.shield=Math.min(player.maxShield,player.shield+SHIELD_REGEN*dt);
  }

  // Auto repair
  if (player.autoRepair && player.hull<player.maxHull) {
    player.hull=Math.min(player.maxHull,player.hull+2*dt);
  }
}

function damagePlayer(dmg) {
  if (player.invulTimer>0) return;
  if (player.evasion && Math.random()<0.2) { setStatus('閃避！'); return; }
  if (player.shield>0) {
    const sd = Math.min(player.shield,dmg);
    player.shield-=sd; dmg-=sd;
  }
  if (dmg>0) player.hull-=dmg;
  player.shieldCooldown=SHIELD_REGEN_DELAY;
  player.invulTimer=0.5;
  if (player.hull<=0) {
    player.hull=0;
    explosion(player.x,player.y,30,'#ff4400');
    explosion(player.x,player.y,20,'#ffaa00');
    state='gameover';
  }
}

function updateBullets(dt) {
  for (let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if (b.life<=0) { bullets.splice(i,1); continue; }
    // Hit asteroids
    let hitAst=false;
    for (const [,chunk] of chunks) {
      for (const ast of chunk.asteroids) {
        if (dist2(b.x,b.y,ast.x,ast.y)<(b.r+ast.r)**2) {
          explosion(b.x,b.y,4,'#aaaaaa');
          bullets.splice(i,1); hitAst=true; break;
        }
      }
      if (hitAst) break;
    }
    if (hitAst) continue;
    // Hit enemies
    let hitEnemy=false;
    for (const [,chunk] of chunks) {
      for (const en of chunk.enemies) {
        if (!en.alive) continue;
        if (dist2(b.x,b.y,en.x,en.y)<(b.r+en.r)**2) {
          en.hp-=b.dmg;
          explosion(b.x,b.y,6,en.color);
          if (en.hp<=0) {
            en.alive=false;
            explosion(en.x,en.y,20,en.color);
            explosion(en.x,en.y,10,'#ffffff');
            // Drop loot
            dropLoot(en.x,en.y,chunk);
          }
          bullets.splice(i,1); hitEnemy=true; break;
        }
      }
      if (hitEnemy) break;
    }
  }
}

function dropLoot(x,y,chunk) {
  const roll = Math.random();
  let type;
  if (roll<0.3) type='ore';
  else if (roll<0.55) type='energy';
  else if (roll<0.75) type='hull';
  else if (roll<0.9) type='crystal';
  else type='alientech';
  chunk.items.push({x,y,type,r:12,bobOffset:Math.random()*Math.PI*2,alive:true});
}

function updateEnemyBullets(dt) {
  for (let i=enemyBullets.length-1;i>=0;i--) {
    const b=enemyBullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if (b.life<=0) { enemyBullets.splice(i,1); continue; }
    // Hit player
    if (dist2(b.x,b.y,player.x,player.y)<(b.r+18)**2) {
      damagePlayer(b.dmg);
      explosion(b.x,b.y,8,'#ff3300');
      enemyBullets.splice(i,1);
    }
  }
}

function updateEnemies(dt) {
  for (const [,chunk] of chunks) {
    for (const en of chunk.enemies) {
      if (!en.alive) continue;
      const dx=player.x-en.x, dy=player.y-en.y;
      const d=Math.sqrt(dx*dx+dy*dy);

      // State machine
      if (d<350) en.state='chase';
      if (d>500) en.state='patrol';
      if (en.state==='chase'&&d<250) en.state='attack';
      if (en.state==='attack'&&d>300) en.state='chase';

      if (en.state==='patrol') {
        en.patrolTimer-=dt;
        if (en.patrolTimer<=0) {
          en.patrolAngle+=( Math.random()-0.5)*1.5;
          en.patrolTimer=1+Math.random()*2;
        }
        en.vx += Math.cos(en.patrolAngle)*en.speed*0.3*dt;
        en.vy += Math.sin(en.patrolAngle)*en.speed*0.3*dt;
      } else if (en.state==='chase'||en.state==='attack') {
        const nx=dx/d, ny=dy/d;
        en.vx += nx*en.speed*dt;
        en.vy += ny*en.speed*dt;
        en.angle = Math.atan2(dy,dx);
      }

      // Drag
      en.vx*=0.85; en.vy*=0.85;
      const spd=Math.sqrt(en.vx**2+en.vy**2);
      if (spd>en.speed) { en.vx*=en.speed/spd; en.vy*=en.speed/spd; }
      en.x+=en.vx*dt; en.y+=en.vy*dt;

      // Melee damage (drone)
      if (en.type==='drone'&&d<en.r+22&&player.invulTimer<=0) {
        damagePlayer(en.dmg*dt);
      }

      // Ranged attack
      if ((en.type==='pirate'||en.type==='alien')&&en.state==='attack') {
        en.fireTimer-=dt;
        if (en.fireTimer<=0) {
          en.fireTimer=en.fireRate;
          const ang=Math.atan2(dy,dx);
          const projSpd = en.type==='alien'?400:500;
          spawnBullet(en.x,en.y,ang,projSpd,en.dmg,'enemy');
        }
      }

      // Collision with player (for nudging)
      if (d<en.r+22) {
        const nx=dx/d, ny=dy/d;
        en.x=player.x-nx*(en.r+22);
        en.y=player.y-ny*(en.r+22);
      }
    }
  }
}

function updateItems(dt) {
  for (const [,chunk] of chunks) {
    for (const item of chunk.items) {
      if (!item.alive) continue;
      if (dist2(player.x,player.y,item.x,item.y)<(18+item.r)**2) {
        collectItem(item);
        item.alive=false;
      }
    }
  }
}

function collectItem(item) {
  const lootMult = player.lootFinder ? 1.3 : 1;
  switch(item.type) {
    case 'energy':
      player.shield=Math.min(player.maxShield,player.shield+30*lootMult);
      setStatus('護盾充能 +30');
      break;
    case 'hull':
      player.hull=Math.min(player.maxHull,player.hull+30*lootMult);
      setStatus('船殼修復 +30');
      break;
    case 'ore':
      const oreAmt=Math.floor((2+Math.random()*3)*lootMult);
      player.ore+=oreAmt;
      setStatus(`礦石 +${oreAmt}`);
      break;
    case 'crystal':
      const cryAmt=Math.floor((1+Math.random()*2)*lootMult);
      player.crystal+=cryAmt;
      setStatus(`晶體 +${cryAmt}`);
      break;
    case 'alientech':
      player.alienTech+=1;
      setStatus('異星科技 +1');
      break;
    case 'warpcore':
      if (!player.warpCoreSet.has(item.id)) {
        player.warpCoreSet.add(item.id);
        player.warpCores++;
        setStatus(`翹曲核心 ${player.warpCores}/5 已蒐集！`);
        explosion(item.x,item.y,30,'#ffdd00');
        explosion(item.x,item.y,20,'#ffffff');
        if (player.warpCores>=5) setStatus('所有翹曲核心已蒐集！前往逃脫傳送門！');
      }
      break;
  }
  explosion(item.x,item.y,8,'#ffffff');
}

function updatePortal(dt) {
  if (player.warpCores<5) return;
  const pcx=Math.floor(ESCAPE_PORTAL_POS.x/CHUNK), pcy=Math.floor(ESCAPE_PORTAL_POS.y/CHUNK);
  const chunk=chunks.get(chunkKey(pcx,pcy));
  if (!chunk||!chunk.portal) return;
  chunk.portal.active=true;
  if (dist2(player.x,player.y,ESCAPE_PORTAL_POS.x,ESCAPE_PORTAL_POS.y)<70**2) {
    state='victory';
  }
}

function updateBlackHole(dt) {
  const d=dist(player.x,player.y,0,0);
  if (d<BH_RADIUS) {
    damagePlayer(BH_DMG*dt);
  }
  // Gravity
  const pullForce = 0.5*(gameTime/60);
  if (d>5) {
    const acc=Math.min(60,pullForce/Math.pow(d,0.8));
    player.vx -= (player.x/d)*acc*dt;
    player.vy -= (player.y/d)*acc*dt;
  }
}

function updateParticles(dt) {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=0.9; p.vy*=0.9;
    p.life-=dt;
    if (p.life<=0) particles.splice(i,1);
  }
  for (let i=engineTrail.length-1;i>=0;i--) {
    const p=engineTrail[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.life-=dt;
    if (p.life<=0) engineTrail.splice(i,1);
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(timestamp) {
  ctx.fillStyle='#000010';
  ctx.fillRect(0,0,W,H);

  if (state==='title') { renderTitle(); return; }

  drawStars();

  ctx.save();
  ctx.translate(W/2-player.x, H/2-player.y);

  drawBlackHole();
  drawAsteroids();
  drawItems(timestamp);
  drawStations(timestamp);
  drawPortal(timestamp);
  drawEnemies(timestamp);
  drawEngineTrail();
  drawPlayer(timestamp);
  drawBullets(timestamp);
  drawParticles();

  ctx.restore();

  drawHUD(timestamp);

  if (state==='paused') drawPaused();
  if (state==='gameover') drawGameOver();
  if (state==='victory') drawVictory(timestamp);
}

function drawStars() {
  for (const s of stars) {
    const px = ((s.x - player.x*s.speed) % W + W*2) % W;
    const py = ((s.y - player.y*s.speed) % H + H*2) % H;
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(px,py,s.sz,s.sz);
  }
  ctx.globalAlpha=1;
}

function drawBlackHole() {
  const x=0,y=0,r=BH_RADIUS;
  // Outer glow
  const grad=ctx.createRadialGradient(x,y,r*0.5,x,y,r*2.5);
  grad.addColorStop(0,'rgba(80,0,120,0.6)');
  grad.addColorStop(0.5,'rgba(30,0,60,0.3)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(x,y,r*2.5,0,Math.PI*2);
  ctx.fillStyle=grad;
  ctx.fill();

  // Core
  const coreGrad=ctx.createRadialGradient(x,y,0,x,y,r);
  coreGrad.addColorStop(0,'rgba(0,0,0,1)');
  coreGrad.addColorStop(0.7,'rgba(10,0,20,0.95)');
  coreGrad.addColorStop(1,'rgba(60,0,100,0.8)');
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=coreGrad;
  ctx.fill();

  // Accretion ring
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(gameTime*0.3);
  for (let i=0;i<3;i++) {
    ctx.rotate(Math.PI*2/3);
    ctx.beginPath();
    ctx.ellipse(0,0,r*1.6,r*0.4,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(150,50,255,${0.3-i*0.08})`;
    ctx.lineWidth=3-i;
    ctx.stroke();
  }
  ctx.restore();
}

function drawAsteroids() {
  for (const [,chunk] of chunks) {
    for (const ast of chunk.asteroids) {
      const dx=ast.x-player.x, dy=ast.y-player.y;
      if (Math.abs(dx)>W&&Math.abs(dy)>H) continue;
      ctx.save();
      ctx.translate(ast.x,ast.y);
      ctx.beginPath();
      ctx.moveTo(ast.verts[0].x,ast.verts[0].y);
      for (let i=1;i<ast.verts.length;i++) ctx.lineTo(ast.verts[i].x,ast.verts[i].y);
      ctx.closePath();
      ctx.fillStyle=ast.color;
      ctx.fill();
      ctx.strokeStyle='rgba(200,200,200,0.2)';
      ctx.lineWidth=1;
      ctx.stroke();
      ctx.restore();
    }
  }
}

function drawItems(t) {
  for (const [,chunk] of chunks) {
    for (const item of chunk.items) {
      if (!item.alive) continue;
      const bob=Math.sin(t*0.001*3+item.bobOffset)*4;
      ctx.save();
      ctx.translate(item.x,item.y+bob);

      const colors={energy:'#00ffee',hull:'#4488ff',ore:'#aa7733',
                    crystal:'#cc44ff',alientech:'#ffee00',warpcore:'#ffdd00'};
      const c=colors[item.type]||'#ffffff';

      if (item.type==='warpcore') {
        const pulse=0.7+0.3*Math.sin(t*0.001*5);
        ctx.shadowColor=c; ctx.shadowBlur=20*pulse;
        ctx.beginPath();
        ctx.arc(0,0,item.r*pulse,0,Math.PI*2);
        ctx.fillStyle=c; ctx.fill();
        ctx.shadowBlur=0;
        // Inner star
        ctx.fillStyle='#ffffff';
        for (let i=0;i<5;i++) {
          const a=i/5*Math.PI*2-Math.PI/2+t*0.001*2;
          ctx.beginPath();
          ctx.arc(Math.cos(a)*7,Math.sin(a)*7,2,0,Math.PI*2);
          ctx.fill();
        }
      } else {
        ctx.shadowColor=c; ctx.shadowBlur=12;
        ctx.beginPath();
        ctx.arc(0,0,item.r,0,Math.PI*2);
        ctx.fillStyle=c+'44';
        ctx.fill();
        ctx.strokeStyle=c;
        ctx.lineWidth=2;
        ctx.stroke();
        ctx.shadowBlur=0;
      }
      ctx.restore();
    }
  }
}

function drawStations(t) {
  for (const [,chunk] of chunks) {
    if (!chunk.station||!chunk.station.alive) continue;
    const st=chunk.station;
    ctx.save();
    ctx.translate(st.x,st.y);
    ctx.rotate(st.angle+t*0.0002);
    // Body
    ctx.fillStyle='#334455';
    ctx.strokeStyle='#55aaff';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.rect(-st.r,-st.r,st.r*2,st.r*2);
    ctx.fill(); ctx.stroke();
    // Solar panels
    ctx.fillStyle='#223366';
    ctx.strokeStyle='#4477cc';
    ctx.lineWidth=1;
    ctx.fillRect(-st.r*2.5,-6,st.r*1.4,12);
    ctx.strokeRect(-st.r*2.5,-6,st.r*1.4,12);
    ctx.fillRect(st.r+0,-6,st.r*1.4,12);
    ctx.strokeRect(st.r+0,-6,st.r*1.4,12);
    // Light
    const pulse=0.5+0.5*Math.sin(t*0.001*3);
    ctx.fillStyle=`rgba(0,255,150,${pulse})`;
    ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Interaction prompt
    const d=dist(player.x,player.y,st.x,st.y);
    if (d<120) {
      ctx.save();
      ctx.translate(st.x,st.y-50);
      ctx.fillStyle='rgba(0,0,0,0.7)';
      ctx.fillRect(-70,-14,140,24);
      ctx.fillStyle='#88ffcc';
      ctx.font='13px Courier New';
      ctx.textAlign='center';
      ctx.fillText('按 E 進入太空站',0,4);
      ctx.restore();
    }
  }
}

function drawPortal(t) {
  if (player.warpCores<5) return;
  const pcx=Math.floor(ESCAPE_PORTAL_POS.x/CHUNK), pcy=Math.floor(ESCAPE_PORTAL_POS.y/CHUNK);
  const chunk=chunks.get(chunkKey(pcx,pcy));
  if (!chunk||!chunk.portal||!chunk.portal.active) return;
  const por=chunk.portal;
  ctx.save();
  ctx.translate(por.x,por.y);
  ctx.rotate(t*0.001*1.5);
  for (let i=0;i<3;i++) {
    ctx.rotate(Math.PI*2/3);
    const grad=ctx.createRadialGradient(0,0,por.r*0.3,0,0,por.r*1.5);
    grad.addColorStop(0,'rgba(0,255,255,0.8)');
    grad.addColorStop(1,'rgba(0,255,255,0)');
    ctx.beginPath(); ctx.arc(0,0,por.r*1.5,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
  }
  const innerGrad=ctx.createRadialGradient(0,0,0,0,0,por.r);
  innerGrad.addColorStop(0,'rgba(255,255,255,0.9)');
  innerGrad.addColorStop(0.5,'rgba(0,200,255,0.7)');
  innerGrad.addColorStop(1,'rgba(0,100,200,0.2)');
  ctx.beginPath(); ctx.arc(0,0,por.r,0,Math.PI*2);
  ctx.fillStyle=innerGrad; ctx.fill();
  ctx.restore();

  // Label
  ctx.save();
  ctx.translate(por.x,por.y-80);
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(-60,-14,120,24);
  ctx.fillStyle='#00ffff';
  ctx.font='bold 13px Courier New';
  ctx.textAlign='center';
  ctx.fillText('逃脫傳送門',0,4);
  ctx.restore();
}

function drawEnemies(t) {
  for (const [,chunk] of chunks) {
    for (const en of chunk.enemies) {
      if (!en.alive) continue;
      ctx.save();
      ctx.translate(en.x,en.y);
      ctx.rotate(en.angle);
      const r=en.r;
      if (en.type==='drone') {
        // Hexagonal drone
        ctx.beginPath();
        for (let i=0;i<6;i++) {
          const a=i/6*Math.PI*2;
          i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
        }
        ctx.closePath();
        ctx.fillStyle='#334455'; ctx.fill();
        ctx.strokeStyle='#88aacc'; ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2);
        ctx.fillStyle='#88aacc'; ctx.fill();
      } else if (en.type==='pirate') {
        // Triangle ship
        ctx.beginPath();
        ctx.moveTo(r,0); ctx.lineTo(-r*0.7,r*0.6); ctx.lineTo(-r*0.4,0); ctx.lineTo(-r*0.7,-r*0.6);
        ctx.closePath();
        ctx.fillStyle='#553322'; ctx.fill();
        ctx.strokeStyle='#ff8833'; ctx.lineWidth=2; ctx.stroke();
        // Engine
        ctx.fillStyle='#ff5500';
        ctx.beginPath(); ctx.arc(-r*0.4,0,4,0,Math.PI*2); ctx.fill();
      } else if (en.type==='alien') {
        // Diamond + spikes
        ctx.beginPath();
        ctx.moveTo(r,0); ctx.lineTo(0,r*0.7); ctx.lineTo(-r,0); ctx.lineTo(0,-r*0.7);
        ctx.closePath();
        ctx.fillStyle='#220033'; ctx.fill();
        ctx.strokeStyle='#aa44ff'; ctx.lineWidth=2; ctx.stroke();
        // Spikes
        ctx.strokeStyle='#cc66ff'; ctx.lineWidth=1;
        for (let i=0;i<4;i++) {
          const a=i/4*Math.PI*2+Math.PI/4;
          ctx.beginPath(); ctx.moveTo(Math.cos(a)*r*0.5,Math.sin(a)*r*0.5);
          ctx.lineTo(Math.cos(a)*r*1.4,Math.sin(a)*r*1.4); ctx.stroke();
        }
      }
      // HP bar
      const hpFrac=en.hp/en.maxHp;
      ctx.fillStyle='#550000';
      ctx.fillRect(-r,-r-10,r*2,5);
      ctx.fillStyle=hpFrac>0.5?'#00cc44':'#ff4400';
      ctx.fillRect(-r,-r-10,r*2*hpFrac,5);
      ctx.restore();
    }
  }
}

function drawEngineTrail() {
  for (const p of engineTrail) {
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha*0.7;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,3*alpha,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawPlayer(t) {
  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.rotate(player.angle);

  // Shield bubble
  if (player.shield>0) {
    const sf=player.shield/player.maxShield;
    ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,150,255,${sf*0.4})`;
    ctx.lineWidth=2;
    if (player.invulTimer>0) ctx.strokeStyle=`rgba(255,255,255,${sf*0.6})`;
    ctx.stroke();
  }

  // Engine glow
  const engGrad=ctx.createRadialGradient(-20,0,0,-20,0,14);
  engGrad.addColorStop(0,'rgba(0,150,255,0.9)');
  engGrad.addColorStop(1,'rgba(0,50,255,0)');
  ctx.beginPath(); ctx.arc(-20,0,14,0,Math.PI*2);
  ctx.fillStyle=engGrad; ctx.fill();

  // Ship body
  ctx.beginPath();
  ctx.moveTo(24,0);
  ctx.lineTo(-14,13);
  ctx.lineTo(-8,0);
  ctx.lineTo(-14,-13);
  ctx.closePath();
  if (player.invulTimer>0&&Math.floor(t*0.01)%2===0) {
    ctx.fillStyle='rgba(255,255,255,0.8)';
  } else {
    ctx.fillStyle='#334466';
  }
  ctx.fill();
  ctx.strokeStyle='#66aaff';
  ctx.lineWidth=2;
  ctx.stroke();

  // Cockpit
  ctx.beginPath(); ctx.arc(10,0,5,0,Math.PI*2);
  ctx.fillStyle='#aaddff'; ctx.fill();

  ctx.restore();
}

function drawBullets(t) {
  for (const b of bullets) {
    const ang=Math.atan2(b.vy,b.vx);
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(ang);
    ctx.shadowColor='#88ffff'; ctx.shadowBlur=8;
    ctx.fillStyle='#00ffff';
    ctx.beginPath(); ctx.ellipse(0,0,8,3,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.shadowBlur=0;
  for (const b of enemyBullets) {
    const ang=Math.atan2(b.vy,b.vx);
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(ang);
    ctx.fillStyle='#ff6600';
    ctx.shadowColor='#ff6600'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.ellipse(0,0,7,3,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.shadowBlur=0;
}

function drawParticles() {
  for (const p of particles) {
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*alpha,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD(t) {
  // Top left panel
  ctx.fillStyle='rgba(0,5,20,0.75)';
  ctx.fillRect(10,10,220,90);
  ctx.strokeStyle='rgba(50,100,200,0.5)';
  ctx.lineWidth=1;
  ctx.strokeRect(10,10,220,90);

  // Hull bar
  ctx.fillStyle='#331111';
  ctx.fillRect(50,20,160,14);
  const hf=player.hull/player.maxHull;
  ctx.fillStyle=hf>0.5?'#cc2222':hf>0.25?'#ff6600':'#ff0000';
  ctx.fillRect(50,20,160*hf,14);
  ctx.fillStyle='#ffffff'; ctx.font='11px Courier New'; ctx.textAlign='left';
  ctx.fillText('船殼',14,32);
  ctx.fillText(`${Math.ceil(player.hull)}/${player.maxHull}`,55,31);

  // Shield bar
  ctx.fillStyle='#111133';
  ctx.fillRect(50,40,160,14);
  const sf=player.shield/player.maxShield;
  ctx.fillStyle='#2255cc';
  ctx.fillRect(50,40,160*sf,14);
  ctx.fillStyle='#aaddff';
  ctx.fillText('護盾',14,52);
  ctx.fillText(`${Math.ceil(player.shield)}/${player.maxShield}`,55,51);

  // Resources
  ctx.fillStyle='#aaaaaa'; ctx.font='11px Courier New';
  ctx.fillText(`礦石: ${player.ore}  晶體: ${player.crystal}  異星: ${player.alienTech}`,14,75);

  // Speed / gravity warning
  const d=dist(player.x,player.y,0,0);
  if (d<600) {
    ctx.fillStyle='rgba(150,0,200,0.15)';
    ctx.fillRect(10,106,220,20);
    ctx.fillStyle='#cc66ff'; ctx.font='11px Courier New';
    ctx.fillText('⚠ 黑洞引力強化中',14,120);
  }

  // Top center: Warp cores
  const cx2=W/2;
  ctx.fillStyle='rgba(0,5,20,0.75)';
  ctx.fillRect(cx2-120,10,240,36);
  ctx.strokeStyle='rgba(50,100,200,0.5)'; ctx.lineWidth=1;
  ctx.strokeRect(cx2-120,10,240,36);
  ctx.fillStyle='#aaaaaa'; ctx.font='11px Courier New'; ctx.textAlign='center';
  ctx.fillText('翹曲核心',cx2,24);
  for (let i=0;i<5;i++) {
    const sx=cx2-90+i*38;
    const collected=i<player.warpCores;
    if (collected) {
      const pulse=0.7+0.3*Math.sin(t*0.001*4+i);
      ctx.fillStyle=`rgba(255,220,0,${pulse})`;
      ctx.shadowColor='#ffdd00'; ctx.shadowBlur=8;
    } else {
      ctx.fillStyle='#333333';
      ctx.shadowBlur=0;
    }
    ctx.beginPath(); ctx.arc(sx,34,8,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    if (!collected) {
      ctx.strokeStyle='#555555'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(sx,34,8,0,Math.PI*2); ctx.stroke();
    }
  }

  // Minimap (top right)
  drawMinimap(t);

  // Status message (bottom center)
  if (statusTimer>0&&statusMsg) {
    const alpha=Math.min(1,statusTimer);
    ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,5,20,0.8)';
    ctx.fillRect(W/2-180,H-60,360,32);
    ctx.fillStyle='#88ffcc';
    ctx.font='14px Courier New'; ctx.textAlign='center';
    ctx.fillText(statusMsg,W/2,H-38);
    ctx.globalAlpha=1;
  }

  // Warp core location hints (when none collected)
  if (player.warpCores===0 && Math.floor(t*0.001)%8<4) {
    ctx.fillStyle='rgba(255,220,0,0.5)';
    ctx.font='10px Courier New'; ctx.textAlign='center';
    ctx.fillText('翹曲核心分佈在銀河各處 — 向遠方探索！',W/2,H-70);
  }
}

function drawMinimap(t) {
  const mx=W-210, my=10, mw=200, mh=200;
  const mapRange=2000;
  const scale=mw/mapRange;

  ctx.fillStyle='rgba(0,5,20,0.85)';
  ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle='rgba(50,100,200,0.6)'; ctx.lineWidth=1;
  ctx.strokeRect(mx,my,mw,mh);

  ctx.save();
  ctx.beginPath(); ctx.rect(mx,my,mw,mh); ctx.clip();

  const toMapX=(wx)=>mx+mw/2+(wx-player.x)*scale;
  const toMapY=(wy)=>my+mh/2+(wy-player.y)*scale;

  // Black hole
  const bx=toMapX(0), by=toMapY(0);
  ctx.beginPath(); ctx.arc(bx,by,8,0,Math.PI*2);
  ctx.fillStyle='rgba(100,0,150,0.8)'; ctx.fill();
  ctx.strokeStyle='#660099'; ctx.lineWidth=1; ctx.stroke();

  // Asteroids (small dots)
  for (const [,chunk] of chunks) {
    for (const ast of chunk.asteroids) {
      const ax=toMapX(ast.x), ay=toMapY(ast.y);
      if (ax<mx||ax>mx+mw||ay<my||ay>my+mh) continue;
      ctx.fillStyle='rgba(100,80,60,0.5)';
      ctx.fillRect(ax-1,ay-1,2,2);
    }
  }

  // Space stations (green squares)
  for (const [,chunk] of chunks) {
    if (!chunk.station||!chunk.station.alive) continue;
    const sx=toMapX(chunk.station.x), sy=toMapY(chunk.station.y);
    if (sx<mx||sx>mx+mw||sy<my||sy>my+mh) continue;
    ctx.fillStyle='#00cc66';
    ctx.fillRect(sx-3,sy-3,6,6);
  }

  // Enemies (red dots)
  for (const [,chunk] of chunks) {
    for (const en of chunk.enemies) {
      if (!en.alive) continue;
      const ex=toMapX(en.x), ey=toMapY(en.y);
      if (ex<mx||ex>mx+mw||ey<my||ey>my+mh) continue;
      ctx.fillStyle='#ff3333';
      ctx.beginPath(); ctx.arc(ex,ey,2,0,Math.PI*2); ctx.fill();
    }
  }

  // Items (cyan dots)
  for (const [,chunk] of chunks) {
    for (const item of chunk.items) {
      if (!item.alive) continue;
      const ix=toMapX(item.x), iy=toMapY(item.y);
      if (ix<mx||ix>mx+mw||iy<my||iy>my+mh) continue;
      if (item.type==='warpcore') {
        const pulse=0.5+0.5*Math.sin(t*0.001*4);
        ctx.fillStyle=`rgba(255,220,0,${pulse})`;
        ctx.beginPath(); ctx.arc(ix,iy,4,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle='rgba(0,200,200,0.6)';
        ctx.beginPath(); ctx.arc(ix,iy,2,0,Math.PI*2); ctx.fill();
      }
    }
  }

  // Warp core arrows (if outside minimap range)
  for (const wcp of WARP_CORE_POSITIONS) {
    const id=`${wcp.x},${wcp.y}`;
    if (player.warpCoreSet.has(id)) continue;
    const dx=wcp.x-player.x, dy=wcp.y-player.y;
    const d2=Math.sqrt(dx*dx+dy*dy);
    if (d2>mapRange/2) {
      // Arrow at minimap edge
      const ang=Math.atan2(dy,dx);
      const ex=mx+mw/2+Math.cos(ang)*(mw/2-8);
      const ey=my+mh/2+Math.sin(ang)*(mh/2-8);
      ctx.save(); ctx.translate(ex,ey); ctx.rotate(ang);
      ctx.fillStyle='#ffdd00';
      ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-4,4); ctx.lineTo(-4,-4); ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // Portal arrow
  if (player.warpCores>=5) {
    const pdx=ESCAPE_PORTAL_POS.x-player.x, pdy=ESCAPE_PORTAL_POS.y-player.y;
    const pd=Math.sqrt(pdx*pdx+pdy*pdy);
    if (pd>mapRange/2) {
      const ang=Math.atan2(pdy,pdx);
      const ex=mx+mw/2+Math.cos(ang)*(mw/2-8);
      const ey=my+mh/2+Math.sin(ang)*(mh/2-8);
      ctx.save(); ctx.translate(ex,ey); ctx.rotate(ang);
      ctx.fillStyle='#00ffff';
      ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(-5,5); ctx.lineTo(-5,-5); ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // Player dot (center)
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(mx+mw/2,my+mh/2,4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#aaaaff'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(mx+mw/2,my+mh/2,6,0,Math.PI*2); ctx.stroke();

  ctx.restore();

  // Coordinates
  ctx.fillStyle='rgba(100,120,160,0.7)'; ctx.font='10px Courier New'; ctx.textAlign='right';
  ctx.fillText(`${Math.floor(player.x)}, ${Math.floor(player.y)}`,mx+mw-2,my+mh+12);
}

// ─── SCREENS ──────────────────────────────────────────────────────────────────
function renderTitle() {
  // Starfield on title
  for (const s of stars) {
    const px=(s.x*3%W+W)%W, py=(s.y*3%H+H)%H;
    ctx.globalAlpha=s.brightness*0.6;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(px,py,s.sz,s.sz);
  }
  ctx.globalAlpha=1;

  // Title glow
  const t=performance.now();
  const pulse=0.8+0.2*Math.sin(t*0.001);

  ctx.save();
  ctx.textAlign='center';

  // Big title
  ctx.font=`bold 56px 'Courier New', monospace`;
  ctx.shadowColor='#4488ff'; ctx.shadowBlur=30*pulse;
  ctx.fillStyle=`rgba(100,170,255,${pulse})`;
  ctx.fillText('虛空領航員',W/2,H/2-120);

  ctx.font='24px Courier New';
  ctx.fillStyle='#6699cc';
  ctx.shadowBlur=10;
  ctx.fillText('Void Navigator',W/2,H/2-75);

  ctx.shadowBlur=0;

  // Story
  ctx.font='14px Courier New';
  ctx.fillStyle='#8899aa';
  const lines=['領航員陳，你被黑洞吸入了未知的銀河！','駕駛你的太空艇，蒐集5個翹曲核心，逃離這裡！'];
  lines.forEach((l,i)=>ctx.fillText(l,W/2,H/2+i*22));

  // Controls
  ctx.font='12px Courier New';
  ctx.fillStyle='#556677';
  const controls=['WASD / 方向鍵: 推進   滑鼠: 瞄準   左鍵 / 空白鍵: 射擊','E: 進入太空站   ESC: 暫停'];
  controls.forEach((l,i)=>ctx.fillText(l,W/2,H/2+80+i*20));

  // Start prompt
  const blinkAlpha=0.5+0.5*Math.sin(t*0.002);
  ctx.globalAlpha=blinkAlpha;
  ctx.font='18px Courier New';
  ctx.fillStyle='#aaddff';
  ctx.fillText('按 ENTER 或點擊開始',W/2,H/2+148);
  ctx.globalAlpha=1;

  ctx.restore();
}

function drawPaused() {
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 48px Courier New';
  ctx.fillStyle='#aaddff';
  ctx.shadowColor='#4488ff'; ctx.shadowBlur=20;
  ctx.fillText('PAUSED',W/2,H/2);
  ctx.shadowBlur=0;
  ctx.font='16px Courier New';
  ctx.fillStyle='#7799aa';
  ctx.fillText('按 ESC 繼續',W/2,H/2+40);
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 44px Courier New';
  ctx.fillStyle='#ff4422';
  ctx.shadowColor='#ff2200'; ctx.shadowBlur=20;
  ctx.fillText('太空艇毀滅，任務失敗',W/2,H/2-60);
  ctx.shadowBlur=0;
  ctx.font='16px Courier New';
  ctx.fillStyle='#aa8877';
  ctx.fillText(`礦石: ${player.ore}  晶體: ${player.crystal}  翹曲核心: ${player.warpCores}/5`,W/2,H/2-10);
  ctx.fillText(`存活時間: ${Math.floor(playTime)}秒`,W/2,H/2+20);
  ctx.font='18px Courier New';
  ctx.fillStyle='#aaddff';
  const blinkAlpha=0.5+0.5*Math.sin(performance.now()*0.002);
  ctx.globalAlpha=blinkAlpha;
  ctx.fillText('按 ENTER 重新開始',W/2,H/2+70);
  ctx.globalAlpha=1;
}

function drawVictory(t) {
  // Victory particles
  if (Math.random()<0.3) {
    const px=Math.random()*W, py=Math.random()*H;
    spawnParticle(px-player.x+W/2,py-player.y+H/2,
      (Math.random()-0.5)*100,(Math.random()-0.5)*100,1,
      `hsl(${Math.random()*360},100%,70%)`,3);
  }

  ctx.fillStyle='rgba(0,0,20,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  const pulse=0.8+0.2*Math.sin(t*0.002);
  ctx.font='bold 42px Courier New';
  ctx.fillStyle=`rgba(0,255,200,${pulse})`;
  ctx.shadowColor='#00ffcc'; ctx.shadowBlur=25*pulse;
  ctx.fillText('你逃出去了！成功返回地球！',W/2,H/2-70);
  ctx.shadowBlur=0;

  ctx.font='18px Courier New';
  ctx.fillStyle='#88ccff';
  ctx.fillText(`飛行時間: ${Math.floor(playTime)}秒`,W/2,H/2-20);
  ctx.fillText(`礦石: ${player.ore}  晶體: ${player.crystal}  異星科技: ${player.alienTech}`,W/2,H/2+15);

  const blinkAlpha=0.5+0.5*Math.sin(t*0.003);
  ctx.globalAlpha=blinkAlpha;
  ctx.font='18px Courier New';
  ctx.fillStyle='#ffee88';
  ctx.fillText('按 ENTER 再次挑戰',W/2,H/2+70);
  ctx.globalAlpha=1;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(timestamp) {
  const dt=Math.min((timestamp-lastTime)/1000,0.05);
  lastTime=timestamp;
  update(dt);
  render(timestamp);
  requestAnimationFrame(loop);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
player = createPlayer();
// Pre-generate origin chunk
generateChunk(0,0);
generateChunk(1,0);
generateChunk(-1,0);
generateChunk(0,1);
generateChunk(0,-1);

requestAnimationFrame(loop);
</script>
